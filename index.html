<script>
  window.__LIB_ERRORS__ = [];
  function reportLoadError(libName) {
    window.__LIB_ERRORS__.push(libName);
    var el = document.getElementById('fallback-error');
    if (el) {
      el.style.display = 'block';
      el.textContent = 'Não foi possível carregar: ' + window.__LIB_ERRORS__.join(', ') + '. Verifique sua conexão com a internet e recarregue a página.';
    }
  }
  window.addEventListener('error', function (e) {
    var el = document.getElementById('fallback-error');
    if (el && el.style.display !== 'block') {
      el.style.display = 'block';
      el.textContent = 'Erro ao carregar o sistema: ' + (e && e.message ? e.message : 'erro desconhecido') + '. Recarregue a página; se persistir, verifique a conexão com a internet.';
    }
  });

  // Quando o Google/Supabase redireciona de volta com #access_token na URL,
  // limpa o hash depois que a lib do Supabase o processar para não deixar
  // o token exposto na barra de endereços.
  if (window.location.hash && window.location.hash.includes('access_token')) {
    window.__OAUTH_CALLBACK__ = true;
    // Aguarda a lib do Supabase carregar antes de limpar o hash.
    window.addEventListener('load', function() {
      setTimeout(function() {
        history.replaceState(null, '', window.location.pathname);
      }, 1000);
    });
  }
</script>

<script>
/* ============================================================
   CARREGADOR COM REDUNDÂNCIA DE CDN
   Cada biblioteca acima tenta um CDN principal (cdnjs/jsDelivr).
   Se falhar (rede instável, bloqueador de anúncios, firewall
   corporativo bloqueando um provedor específico), este bloco
   tenta automaticamente um CDN alternativo antes de desistir.
   No pior caso, o comportamento é idêntico ao de antes (aviso
   de recurso indisponível) — nunca fica pior do que estava.
============================================================ */
(function () {
  // Se o Babel já carregou nesse ponto (caso comum), impede que ele rode o
  // app sozinho assim que a página terminar de parsear — isso evita que ele
  // tente executar o código antes do React/ReactDOM estarem prontos, caso
  // algum deles precise do CDN reserva (mais lento). Nós mesmos disparamos
  // a execução manualmente mais abaixo, só quando tudo estiver garantido.
  if (window.Babel && typeof Babel.disableScriptTags === 'function') {
    Babel.disableScriptTags();
  }

  function carregarScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = function () { reject(new Error('Falha ao carregar ' + src)); };
      document.head.appendChild(s);
    });
  }

  // Garante que "condicaoOk" fique verdadeira, tentando cada URL da lista
  // de reserva em ordem até uma funcionar. Só reporta erro se TODAS falharem.
  function garantir(condicaoOk, urlsReserva, nomeAmigavel) {
    if (condicaoOk()) return Promise.resolve(true);
    var restantes = urlsReserva.slice();
    function tentarProxima() {
      if (restantes.length === 0) {
        reportLoadError(nomeAmigavel);
        return false;
      }
      var url = restantes.shift();
      return carregarScript(url)
        .then(function () { return condicaoOk() ? true : tentarProxima(); })
        .catch(tentarProxima);
    }
    return Promise.resolve(tentarProxima());
  }

  // 1) React → 2) ReactDOM → 3) Babel, nesta ordem (cada um depende do anterior).
  garantir(function () { return typeof React !== 'undefined'; }, [
    'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
    'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
  ], 'React')
    .then(function () {
      return garantir(function () { return typeof ReactDOM !== 'undefined'; }, [
        'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js',
        'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
      ], 'ReactDOM');
    })
    .then(function () {
      return garantir(function () { return typeof Babel !== 'undefined'; }, [
        'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js',
        'https://unpkg.com/@babel/standalone@7.23.5/babel.min.js',
      ], 'Babel');
    })
    .then(function (babelOk) {
      // Chamado sempre que React + ReactDOM + Babel estão confirmadamente
      // prontos (independentemente de qual CDN funcionou). Se o Babel já
      // tivesse rodado o app sozinho, esta chamada é inofensiva (idempotente
      // — o Babel ignora tags já processadas); se ainda não rodou (porque
      // desabilitamos a execução automática lá em cima), é ela quem dispara
      // o app pela primeira e única vez.
      if (babelOk && window.Babel && typeof Babel.transformScriptTags === 'function') {
        Babel.transformScriptTags();
      }
    })
    .catch(function (e) { console.error(e); });

  // Bibliotecas de apoio — o sistema continua funcionando sem elas,
  // só com a funcionalidade específica indisponível.
  // O Recharts exige prop-types e react-is carregados ANTES dele —
  // sem isso, o próprio arquivo do Recharts quebra ao rodar (mesmo
  // se o download der certo), e nenhum gráfico do sistema funciona.
  garantir(function () { return typeof PropTypes !== 'undefined'; }, [
    'https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js',
    'https://unpkg.com/prop-types@15.8.1/prop-types.min.js',
  ], 'PropTypes (dependência dos gráficos)')
    .then(function () {
      return garantir(function () { return typeof window['react-is'] !== 'undefined' || typeof ReactIs !== 'undefined'; }, [
        'https://cdn.jsdelivr.net/npm/react-is@18.2.0/umd/react-is.production.min.js',
        'https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js',
      ], 'react-is (dependência dos gráficos)');
    })
    .then(function () {
      return garantir(function () { return typeof Recharts !== 'undefined'; }, [
        'https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.js',
        'https://unpkg.com/recharts@2.10.3/umd/Recharts.js',
      ], 'Recharts (gráficos ficarão indisponíveis)');
    })
    .then(function (ok) {
      if (ok) { window.__RECHARTS_PRONTO__ = true; window.dispatchEvent(new Event('recharts-pronto')); }
    })
    .catch(function (e) { console.error(e); });

  garantir(function () { return typeof XLSX !== 'undefined'; }, [
    'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
    'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js',
  ], 'XLSX (exportação Excel ficará indisponível)');

  garantir(function () { return typeof pdfjsLib !== 'undefined'; }, [
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js',
    'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js',
  ], 'PDF.js (extração e busca em PDF ficarão indisponíveis)').then(function (ok) {
    if (ok && window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  });

  garantir(function () { return typeof window.supabase !== 'undefined'; }, [
    'https://unpkg.com/@supabase/supabase-js@2',
  ], 'Supabase (banco de dados indisponível)');
})();

<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

/* ============================================================

============================================================ */

const TIPOS_DOCUMENTO = ["PAS", "Protocolo", "Deliberação", "Resolução", "Portaria", "Parecer", "Memorando", "Fluxo interno", "Norma administrativa", "DUT (ANS)", "Outro"];

const ORIGENS_DEMANDA = ["Gerência", "Chefia", "Representante Regional", "Equipe Administrativa do IPSM", "Diretoria", "Beneficiário", "Prestador", "Outro"];

const PRIORIDADES = ["Urgente", "Normal", "Baixa prioridade"];

const STATUS_DEMANDA = ["Recebida", "Em andamento", "Aguardando resposta", "Concluída", "Cancelada"];

const CLASSIFICACOES_DEMANDA = ["Administrativa", "Médica", "Jurídica", "Financeira", "Atendimento ao beneficiário", "Atendimento ao prestador", "Institucional", "Outro"];

const SETORES = [

  "Teledigifonista", "Backoffices", "SAD", "Odontologia", "Saúde Mental", "Assessoria",
];

const TURNOS_ESCALA = ["Manhã", "Tarde", "Noite", "Integral", "Plantão 24h", "Personalizado"];

const COR_STATUS = {
  "Recebida": { bg: "var(--steel-pale)", fg: "var(--steel)" },
  "Em andamento": { bg: "var(--amber-pale)", fg: "var(--amber)" },
  "Aguardando resposta": { bg: "rgba(167,139,214,0.16)", fg: "#B49BE0" },
  "Concluída": { bg: "var(--teal-pale)", fg: "var(--teal)" },
  "Cancelada": { bg: "rgba(148,160,172,0.16)", fg: "#9AA6B2" },
};

const COR_PRIORIDADE = {
  "Urgente": { bg: "var(--terracotta-pale)", fg: "var(--terracotta)" },
  "Normal": { bg: "var(--steel-pale)", fg: "var(--steel)" },
  "Baixa prioridade": { bg: "rgba(148,160,172,0.16)", fg: "#9AA6B2" },
};

function uid(prefix) {
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
}

function gerarNumeroDemanda(seq) {
  const ano = new Date().getFullYear();
  return `DEM-${ano}-${String(seq).padStart(4, "0")}`;
}

const FUSO_BR = "America/Sao_Paulo";

function formatarData(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString("pt-BR", { timeZone: FUSO_BR });
}

function formatarDataHora(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString("pt-BR", { timeZone: FUSO_BR }) + " às " + d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", timeZone: FUSO_BR });
}

function hojeISO() {
  // Data de hoje calculada no fuso de Brasília, não em UTC, para não
  // "virar o dia" antes da hora local (importante perto da meia-noite).
  const partes = new Intl.DateTimeFormat("en-CA", {
    timeZone: FUSO_BR, year: "numeric", month: "2-digit", day: "2-digit",
  }).formatToParts(new Date());
  const obj = {};
  partes.forEach(p => { obj[p.type] = p.value; });
  return `${obj.year}-${obj.month}-${obj.day}`;
}

function agoraHoraBR() {
  return new Intl.DateTimeFormat("pt-BR", {
    timeZone: FUSO_BR, hour: "2-digit", minute: "2-digit",
  }).format(new Date());
}

function ehHoje(iso) {
  if (!iso) return false;
  return iso.slice(0, 10) === hojeISO();
}

/* ============================================================
   1) CONFIGURAÇÃO DO SUPABASE
   Preencha com os dados do seu projeto (Project Settings → API).
============================================================ */

const SUPABASE_URL = "https://razuyifigjszdnbyvqce.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhenV5aWZpZ2pzemRuYnl2cWNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTkxMzksImV4cCI6MjA5ODM5NTEzOX0.l5-TZiZ8TvvAyu5diaI3XWWo6pvi5rUf4Vg4kR6E7YU";
const BUCKET_ANEXOS = "anexos"; // bucket do Supabase Storage para documentos normativos e anexos de demanda

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    autoRefreshToken: true,
    persistSession: true,
    detectSessionInUrl: true,
    flowType: 'implicit',
  }
});

/* ============================================================
   2) AUTENTICAÇÃO (Supabase Auth: Google OAuth + e-mail/senha)
   A senha nunca passa pelo nosso código — é validada inteiramente
   pelo servidor do Supabase, com muito mais segurança do que um
   hash feito no navegador.
============================================================ */

async function entrarComGoogle() {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://ipsm-assessoria.netlify.app",
      skipBrowserRedirect: false,
    },
  });
  if (error) throw error;
}

// Gera um e-mail fictício interno a partir do nome e sobrenome
// O usuário nunca vê nem precisa saber desse e-mail
function gerarEmailInterno(nome, sobrenome) {
  const n = nome.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "").replace(/[^a-z0-9]/g, "");
  const s = sobrenome.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "").replace(/[^a-z0-9]/g, "");
  return `${n}.${s}@ipsm-assessoria.example.com`;
}

async function entrarComNomeSenha(nome, sobrenome, senha) {
  const email = gerarEmailInterno(nome, sobrenome);
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: senha });
  if (error) {
    if (error.message === "Invalid login credentials") {
      throw new Error("Nome, sobrenome ou senha incorretos.");
    }
    throw error;
  }
  return data;
}

async function cadastrarComNomeSenha({ nome, sobrenome, setor, senha }) {
  const email = gerarEmailInterno(nome, sobrenome);
  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password: senha,
    options: { data: { nome, sobrenome, setor } },
  });
  if (error) {
    if (error.message && error.message.toLowerCase().includes("already registered")) {
      throw new Error("Já existe um cadastro com esse nome e sobrenome.");
    }
    throw error;
  }
  return data;
}

async function sairDaConta() {
  await supabaseClient.auth.signOut();
}

async function obterSessaoAtual() {
  // Quando o Google redireciona de volta, o Supabase coloca o token no hash da URL.
  // Precisamos processar esse hash antes de tentar obter a sessão.
  if (window.location.hash && window.location.hash.includes('access_token')) {
    const { data, error } = await supabaseClient.auth.getSession();
    if (!error && data.session) return data.session;
  }
  const { data } = await supabaseClient.auth.getSession();
  return data.session;
}

/* ============================================================
   3) PERFIS (tabela "perfis" — nome, sobrenome, setor, papel)
   O primeiro perfil criado no sistema vira administrador.
============================================================ */

async function listarPerfis() {
  const { data, error } = await supabaseClient.from("perfis").select("*").order("criado_em", { ascending: true });
  if (error) throw error;
  return data || [];
}

async function obterOuCriarPerfil(usuarioAuth) {
  const { data: existente, error: erroSelect } = await supabaseClient
    .from("perfis").select("*").eq("id", usuarioAuth.id).maybeSingle();
  if (erroSelect) throw erroSelect;
  if (existente) return existente;

  const { count, error: erroCount } = await supabaseClient
    .from("perfis").select("id", { count: "exact", head: true });
  if (erroCount) throw erroCount;

  const meta = usuarioAuth.user_metadata || {};
  let nome = meta.nome || "";
  let sobrenome = meta.sobrenome || "";
  if (!nome && meta.full_name) {
    const partes = meta.full_name.trim().split(" ");
    nome = partes[0] || "";
    sobrenome = partes.slice(1).join(" ") || "";
  }

  const { data: novo, error: erroInsert } = await supabaseClient
    .from("perfis")
    .insert([{
      id: usuarioAuth.id,
      email: usuarioAuth.email,
      nome: nome || usuarioAuth.email,
      sobrenome: sobrenome || "",
      setor: meta.setor || "Assessoria",
      role: (count || 0) === 0 ? "admin" : "colaborador",
      ativo: true,
    }])
    .select()
    .single();
  if (erroInsert) throw erroInsert;
  return novo;
}

async function atualizarPerfil(id, campos) {
  const { error } = await supabaseClient.from("perfis").update(campos).eq("id", id);
  if (error) throw error;
}

async function removerPerfil(id) {
  const { error } = await supabaseClient.from("perfis").delete().eq("id", id);
  if (error) throw error;
}

function nomeCompletoUsuario(u) {
  if (!u) return "";
  return `${u.nome || ""} ${u.sobrenome || ""}`.trim();
}

function iniciaisUsuario(u) {
  if (!u) return "?";
  const n = (u.nome || "").trim()[0] || "";
  const s = (u.sobrenome || "").trim()[0] || "";
  return (n + s).toUpperCase() || "?";
}

/* ============================================================
   4) DADOS — CRUD genérico nas tabelas do Supabase
   (documentos, demandas, escalas, atestados)
============================================================ */

async function listarRegistros(tabela, ordenarPor) {
  let query = supabaseClient.from(tabela).select("*");
  if (ordenarPor) query = query.order(ordenarPor, { ascending: false });
  const { data, error } = await query;
  if (error) throw error;
  return data || [];
}

async function contarRegistros(tabela) {
  const { count, error } = await supabaseClient.from(tabela).select("id", { count: "exact", head: true });
  if (error) throw error;
  return count || 0;
}

async function inserirRegistro(tabela, registro) {
  const { data, error } = await supabaseClient.from(tabela).insert([registro]).select().single();
  if (error) throw error;
  return data;
}

async function atualizarRegistro(tabela, id, campos) {
  const { data, error } = await supabaseClient.from(tabela).update(campos).eq("id", id).select().single();
  if (error) throw error;
  return data;
}

async function excluirRegistro(tabela, id) {
  const { error } = await supabaseClient.from(tabela).delete().eq("id", id);
  if (error) throw error;
}

/* ============================================================
   5) ARQUIVOS — upload no Supabase Storage
============================================================ */

async function enviarArquivo(file, pasta) {
  const caminho = `${pasta}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.\-_]/g, "_")}`;
  const { error } = await supabaseClient.storage.from(BUCKET_ANEXOS).upload(caminho, file, { upsert: false });
  if (error) throw error;
  const { data } = supabaseClient.storage.from(BUCKET_ANEXOS).getPublicUrl(caminho);
  return { nome: file.name, url: data.publicUrl };
}

/* ============================================================
   CAMADA DE PDF — extração de texto e busca por relevância
   Usada pela Base Normativa (busca dentro dos documentos) e
   pelo módulo de Atestados de Funcionários.
============================================================ */

async function extrairTextoPDF(file) {
  if (typeof pdfjsLib === "undefined") return "";
  try {
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
    let texto = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const pagina = await pdf.getPage(i);
      const conteudo = await pagina.getTextContent();
      texto += conteudo.items.map((it) => it.str).join(" ") + "\n";
    }
    return texto.trim();
  } catch (e) {
    console.error("Erro ao extrair texto do PDF:", e);
    return "";
  }
}

async function extrairTextoDeArquivo(file) {
  if (file.type === "application/pdf" || /\.pdf$/i.test(file.name)) {
    return extrairTextoPDF(file);
  }
  const tiposTexto = ["text/plain", "text/csv", "text/html", "application/json"];
  if (tiposTexto.includes(file.type) || /\.(txt|csv|md)$/i.test(file.name)) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ""));
      reader.onerror = () => resolve("");
      reader.readAsText(file);
    });
  }
  return "";
}

function normalizarBusca(texto) {
  return (texto || "")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// Busca por palavras-chave dentro do texto indexado dos documentos,
// ignorando maiúsculas/minúsculas e acentos, aceitando múltiplos termos,
// e ordenando por relevância (quantidade de ocorrências).
function buscarNoConteudoDocumentos(documentos, consulta) {
  const termos = normalizarBusca(consulta).split(/\s+/).filter(Boolean);
  if (termos.length === 0) return [];
  const resultados = [];
  documentos.forEach((doc) => {
    const textoOriginal = doc.conteudo_texto || "";
    const textoNormalizado = normalizarBusca(textoOriginal);
    let ocorrencias = 0;
    let primeiraPos = -1;
    termos.forEach((t) => {
      let pos = 0;
      while (true) {
        const idx = textoNormalizado.indexOf(t, pos);
        if (idx === -1) break;
        ocorrencias++;
        if (primeiraPos === -1) primeiraPos = idx;
        pos = idx + t.length;
      }
    });
    if (ocorrencias > 0) {
      const inicio = Math.max(0, primeiraPos - 90);
      const fim = Math.min(textoOriginal.length, primeiraPos + 220);
      const trecho = (inicio > 0 ? "…" : "") + textoOriginal.slice(inicio, fim) + (fim < textoOriginal.length ? "…" : "");
      resultados.push({ doc, ocorrencias, trecho });
    }
  });
  resultados.sort((a, b) => b.ocorrencias - a.ocorrencias);
  return resultados;
}

// Divide um trecho de texto em partes, destacando os termos buscados.
function partesComDestaque(texto, termos) {
  if (!termos || termos.length === 0) return [texto];
  const escapados = termos.map((t) => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).filter(Boolean);
  if (escapados.length === 0) return [texto];
  const regex = new RegExp(`(${escapados.join("|")})`, "gi");
  return texto.split(regex);
}

// Detecta de forma reativa quando a biblioteca de gráficos (Recharts) fica
// disponível — inclusive se o carregamento inicial demorou ou precisou do
// CDN de reserva. Sem isso, uma tela que já tinha renderizado "gráficos
// indisponíveis" nunca voltaria a mostrar os gráficos sozinha.
function useRechartsPronto() {
  const [pronto, setPronto] = useState(() => typeof Recharts !== "undefined");
  useEffect(() => {
    if (pronto) return;
    function onPronto() { setPronto(true); }
    window.addEventListener("recharts-pronto", onPronto);
    if (typeof Recharts !== "undefined") { setPronto(true); return; }
    return () => window.removeEventListener("recharts-pronto", onPronto);
  }, [pronto]);
  return pronto;
}

      stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
      style={{ display: "inline-block", flexShrink: 0, verticalAlign: "middle", ...style }}
      dangerouslySetInnerHTML={{ __html: d }}
    />
  );
}

function Badge({ children, bg, fg, style }) {

function StatusBadge({ status }) {

function PrioridadeBadge({ prioridade }) {

}

function Button({ children, onClick, variant = "primary", size = "md", icon, disabled, type = "button", style, title }) {
  const base = {
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 7,
    fontWeight: 600, borderRadius: 8, border: "1px solid transparent",
    transition: "background 0.15s, border-color 0.15s, opacity 0.15s",
    opacity: disabled ? 0.55 : 1, cursor: disabled ? "not-allowed" : "pointer",
    whiteSpace: "nowrap",
  };
  const sizes = {
    sm: { padding: "6px 12px", fontSize: 13 },
    md: { padding: "9px 16px", fontSize: 14 },
    lg: { padding: "12px 20px", fontSize: 15.5 },
  };
  const variants = {
    primary: { background: "var(--navy)", color: "#fff" },
    accent: { background: "var(--steel)", color: "#fff" },
    secondary: { background: "var(--paper)", color: "var(--heading)", borderColor: "var(--line)" },
    ghost: { background: "transparent", color: "var(--ink-soft)" },
    danger: { background: "var(--terracotta-pale)", color: "var(--terracotta)" },
    success: { background: "var(--teal)", color: "#fff" },
  };
  return (
    <button
      type={type}
      title={title}
      onClick={disabled ? undefined : onClick}
      disabled={disabled}
      style={{ ...base, ...sizes[size], ...variants[variant], ...style }}
      onMouseEnter={(e) => { if (!disabled) e.currentTarget.style.filter = "brightness(0.95)"; }}
      onMouseLeave={(e) => { e.currentTarget.style.filter = "none"; }}
    >
      {icon && <Icon name={icon} size={size === "lg" ? 18 : 15} />}
      {children}
    </button>
  );
}

function Card({ children, style, padded = true }) {
  return (
    <div style={{
      background: "var(--paper)", border: "1px solid var(--line)", borderRadius: 12,
      padding: padded ? 20 : 0, ...style
    }}>

}

function SectionTitle({ eyebrow, title, subtitle, action }) {

function Field({ label, children, hint, required }) {

const inputStyle = {
  width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid var(--line)",
  fontSize: 14, color: "var(--ink)", background: "var(--paper)", outline: "none",
};

function Input(props) {
  const disabledStyle = props.disabled ? { opacity: 0.55, cursor: "not-allowed", background: "var(--pearl)" } : {};
  return <input {...props} style={{ ...inputStyle, ...disabledStyle, ...(props.style || {}) }} />;
}
function Textarea(props) {
  return <textarea {...props} style={{ ...inputStyle, resize: "vertical", lineHeight: 1.5, ...(props.style || {}) }} />;
}
function Select({ children, ...props }) {
  return <select {...props} style={{ ...inputStyle, ...(props.style || {}) }}>{children}</select>;
}

function Modal({ open, onClose, title, children, width = 640 }) {
  if (!open) return null;
  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(2,6,12,0.72)", zIndex: 100,

function Spinner({ size = 16, color = "var(--steel)" }) {
  return (
    <span className="spin" style={{

    }} />

/* Toasts */
const ToastContext = createContext(null);
function useToast() { return useContext(ToastContext); }
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = "info") => {
    const id = uid("toast");
    setToasts((t) => [...t, { id, msg, type }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 4200);
  }, []);
  return (
    <ToastContext.Provider value={push}>
      {children}
      <div style={{ position: "fixed", bottom: 20, right: 20, zIndex: 200, display: "flex", flexDirection: "column", gap: 8, maxWidth: 340 }}>
        {toasts.map((t) => (
          <div key={t.id} className="slide-in" style={{
            background: t.type === "error" ? "var(--terracotta)" : t.type === "success" ? "var(--teal)" : "var(--navy)",
            color: "#fff", padding: "12px 16px", borderRadius: 10, fontSize: 13.5, boxShadow: "0 8px 24px rgba(0,0,0,0.18)",
            display: "flex", alignItems: "flex-start", gap: 8,
          }}>
            <Icon name={t.type === "error" ? "alert-triangle" : t.type === "success" ? "check-circle" : "info"} size={16} style={{ marginTop: 1, flexShrink: 0 }} />
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

/* ============================================================
   TELA DE AUTENTICAÇÃO (login + cadastro)
============================================================ */

function TelaAutenticacao() {
  const toast = useToast();
  const [aba, setAba] = useState("login");
  const [carregando, setCarregando] = useState(false);

  // Login
  const [loginNome, setLoginNome] = useState("");
  const [loginSobrenome, setLoginSobrenome] = useState("");
  const [loginSenha, setLoginSenha] = useState("");
  const [mostrarLoginSenha, setMostrarLoginSenha] = useState(false);

  // Cadastro
  const [cadNome, setCadNome] = useState("");
  const [cadSobrenome, setCadSobrenome] = useState("");
  const [cadSetor, setCadSetor] = useState(SETORES[SETORES.length - 1]);
  const [cadSenha, setCadSenha] = useState("");
  const [cadSenha2, setCadSenha2] = useState("");
  const [mostrarCadSenha, setMostrarCadSenha] = useState(false);

  async function fazerLogin(e) {
    e.preventDefault();
    if (!loginNome.trim() || !loginSobrenome.trim()) { toast("Informe nome e sobrenome.", "error"); return; }
    if (!loginSenha) { toast("Informe a senha.", "error"); return; }
    setCarregando(true);
    try {
      await entrarComNomeSenha(loginNome.trim(), loginSobrenome.trim(), loginSenha);
    } catch (err) {
      toast(err.message, "error");
    } finally {
      setCarregando(false);
    }
  }

  async function fazerCadastro(e) {
    e.preventDefault();
    if (!cadNome.trim() || !cadSobrenome.trim()) { toast("Informe nome e sobrenome.", "error"); return; }
    if (cadSenha.length < 6) { toast("A senha deve ter pelo menos 6 caracteres.", "error"); return; }
    if (cadSenha !== cadSenha2) { toast("As senhas não conferem.", "error"); return; }
    setCarregando(true);
    try {
      await cadastrarComNomeSenha({ nome: cadNome.trim(), sobrenome: cadSobrenome.trim(), setor: cadSetor, senha: cadSenha });
      toast("Cadastro criado com sucesso! Entrando...", "success");
    } catch (err) {
      toast(err.message, "error");
    } finally {
      setCarregando(false);
    }
  }

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "var(--pearl)", padding: 20,
    }}>
      <div style={{ width: "100%", maxWidth: 420 }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 24 }}>
          <div style={{
            width: 64, height: 64, borderRadius: 16, background: "linear-gradient(160deg, var(--navy), var(--navy-deep))",
            border: "1px solid var(--line)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 14,
          }}>
            <LogoIPSM size={38} />
          </div>
          <h1 style={{ fontFamily: "var(--font-display)", fontSize: 21, color: "var(--heading)", margin: 0, textAlign: "center" }}>Assessoria IPSM</h1>
          <p style={{ fontSize: 12.5, color: "var(--ink-soft)", margin: "4px 0 0", textAlign: "center", maxWidth: 320 }}>
            Instituto de Previdência dos Servidores Militares do Estado de Minas Gerais
          </p>
        </div>

        <Card style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ display: "flex", borderBottom: "1px solid var(--line)" }}>
            <button onClick={() => setAba("login")} style={{
              flex: 1, padding: "13px 0", background: aba === "login" ? "var(--paper)" : "var(--pearl)",
              border: "none", borderBottom: aba === "login" ? "2px solid var(--steel)" : "2px solid transparent",
              color: aba === "login" ? "var(--heading)" : "var(--ink-soft)", fontWeight: 700, fontSize: 13.5,
            }}>Entrar</button>
            <button onClick={() => setAba("cadastro")} style={{
              flex: 1, padding: "13px 0", background: aba === "cadastro" ? "var(--paper)" : "var(--pearl)",
              border: "none", borderBottom: aba === "cadastro" ? "2px solid var(--steel)" : "2px solid transparent",
              color: aba === "cadastro" ? "var(--heading)" : "var(--ink-soft)", fontWeight: 700, fontSize: 13.5,
            }}>Cadastrar</button>
          </div>

          <div style={{ padding: 22 }}>
            {aba === "login" ? (
              <form onSubmit={fazerLogin}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Field label="Nome" required>
                    <Input value={loginNome} onChange={(e) => setLoginNome(e.target.value)} placeholder="Ex: Diego" autoComplete="given-name" />
                  </Field>
                  <Field label="Sobrenome" required>
                    <Input value={loginSobrenome} onChange={(e) => setLoginSobrenome(e.target.value)} placeholder="Ex: Silva" autoComplete="family-name" />
                  </Field>
                </div>
                <Field label="Senha" required>
                  <div style={{ position: "relative" }}>
                    <Input
                      type={mostrarLoginSenha ? "text" : "password"}
                      value={loginSenha}
                      onChange={(e) => setLoginSenha(e.target.value)}
                      autoComplete="current-password"
                      style={{ paddingRight: 40 }}
                    />
                    <button
                      type="button"
                      onClick={() => setMostrarLoginSenha((v) => !v)}
                      title={mostrarLoginSenha ? "Ocultar senha" : "Mostrar senha"}
                      style={{
                        position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)",
                        background: "transparent", border: "none", padding: 4, display: "flex", cursor: "pointer",
                      }}
                    >
                      <Icon name={mostrarLoginSenha ? "eye-off" : "eye"} size={16} color="var(--ink-soft)" />
                    </button>
                  </div>
                </Field>
                <Button type="submit" variant="accent" icon="lock" disabled={carregando} style={{ width: "100%", justifyContent: "center", marginTop: 4 }}>
                  {carregando ? <Spinner size={14} color="#fff" /> : "Entrar"}
                </Button>
              </form>
            ) : (
              <form onSubmit={fazerCadastro}>
                <div style={{ background: "var(--teal-pale)", borderRadius: 8, padding: 10, marginBottom: 14, fontSize: 12, color: "#7FDDCB", display: "flex", gap: 8 }}>
                  <Icon name="crown" size={14} color="var(--gold)" style={{ flexShrink: 0 }} />
                  O primeiro cadastro feito no sistema se torna automaticamente o administrador (ADM).
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Field label="Nome" required><Input value={cadNome} onChange={(e) => setCadNome(e.target.value)} autoComplete="given-name" /></Field>
                  <Field label="Sobrenome" required><Input value={cadSobrenome} onChange={(e) => setCadSobrenome(e.target.value)} autoComplete="family-name" /></Field>
                </div>
                <Field label="Setor">
                  <Select value={cadSetor} onChange={(e) => setCadSetor(e.target.value)}>
                    {SETORES.map(s => <option key={s} value={s}>{s}</option>)}
                  </Select>
                </Field>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <Field label="Senha" required hint="Mínimo 6 caracteres">
                    <div style={{ position: "relative" }}>
                      <Input type={mostrarCadSenha ? "text" : "password"} value={cadSenha} onChange={(e) => setCadSenha(e.target.value)} autoComplete="new-password" style={{ paddingRight: 40 }} />
                      <button
                        type="button"
                        onClick={() => setMostrarCadSenha((v) => !v)}
                        title={mostrarCadSenha ? "Ocultar senha" : "Mostrar senha"}
                        style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "transparent", border: "none", padding: 4, display: "flex", cursor: "pointer" }}
                      >
                        <Icon name={mostrarCadSenha ? "eye-off" : "eye"} size={16} color="var(--ink-soft)" />
                      </button>
                    </div>
                  </Field>
                  <Field label="Confirmar senha" required>
                    <Input type={mostrarCadSenha ? "text" : "password"} value={cadSenha2} onChange={(e) => setCadSenha2(e.target.value)} autoComplete="new-password" />
                  </Field>
                </div>
                <Button type="submit" variant="accent" icon="user-plus" disabled={carregando} style={{ width: "100%", justifyContent: "center", marginTop: 4 }}>
                  {carregando ? <Spinner size={14} color="#fff" /> : "Criar cadastro"}
                </Button>
              </form>
            )}
          </div>
        </Card>

        <p style={{ fontSize: 11, color: "var(--ink-soft)", textAlign: "center", marginTop: 16, lineHeight: 1.5 }}>
          Login e senha são gerenciados com segurança pelo Supabase — seus dados não ficam salvos neste navegador.
        </p>
      </div>
    </div>
  );
}

function Dashboard({ setActive }) {
  const { demandas, documentos } = useApp();
  const rechartsDisponivel = useRechartsPronto();
  const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = rechartsDisponivel ? Recharts : {};

  const demandasHoje = useMemo(() => demandas.filter(d => ehHoje(d.data_criacao)), [demandas]);

  const kpis = useMemo(() => {
    const total = demandasHoje.length;
    const urgentes = demandasHoje.filter(d => d.prioridade === "Urgente").length;
    const normais = demandasHoje.filter(d => d.prioridade === "Normal").length;
    const concluidas = demandasHoje.filter(d => d.status === "Concluída").length;
    const pendentes = demandasHoje.filter(d => !["Concluída", "Cancelada"].includes(d.status)).length;
    return { total, urgentes, normais, concluidas, pendentes };
  }, [demandasHoje]);

  const porOrigem = useMemo(() => {
    return ORIGENS_DEMANDA.map(o => ({ name: o, value: demandasHoje.filter(d => d.origem === o).length })).filter(x => x.value > 0);
  }, [demandasHoje]);

  const porStatus = useMemo(() => {
    return STATUS_DEMANDA.map(s => ({ name: s, value: demandasHoje.filter(d => d.status === s).length }));
  }, [demandasHoje]);

  const porPrioridade = useMemo(() => {
    return PRIORIDADES.map(p => ({ name: p, value: demandasHoje.filter(d => d.prioridade === p).length }));
  }, [demandasHoje]);

  const porResponsavel = useMemo(() => {
    const map = {};
    demandasHoje.forEach(d => {
      const r = d.responsavel || "Não atribuído";
      map[r] = (map[r] || 0) + 1;
    });
    return Object.entries(map).map(([name, value]) => ({ name, value }));
  }, [demandasHoje]);

  const CORES_PIE = ["var(--steel)", "var(--gold)", "var(--teal)", "var(--amber)", "var(--terracotta)", "#A78BD6", "#8FA0B3", "#8FBEE0"];
  const CORES_RESOLVED = ["#5B9BD0", "#C9A24B", "#3FC3AE", "#E0B354", "#E07856", "#A78BD6", "#8FA0B3", "#8FBEE0"];

  function KpiCard({ icon, label, value, accent }) {
    return (
      <Card style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, background: accent + "22", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Icon name={icon} size={16} color={accent} />
          </div>
          <span style={{ fontSize: 12.5, color: "var(--ink-soft)", fontWeight: 600 }}>{label}</span>
        </div>
        <div style={{ fontFamily: "var(--font-display)", fontSize: 30, fontWeight: 600, color: "var(--heading)" }}>{value}</div>
      </Card>
    );
  }

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Painel diário"
        title="Visão geral de hoje"
        subtitle={`Resumo das demandas registradas em ${new Date().toLocaleDateString("pt-BR")}. ${documentos.length} documento(s) na base normativa.`}
        action={<Button icon="plus" onClick={() => setActive("demandas")}>Nova demanda</Button>}
      />

      <div id="kpi-grid" style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 14, marginBottom: 24 }}>
        <KpiCard icon="inbox" label="Total do dia" value={kpis.total} accent="#8FBEE0" />
        <KpiCard icon="zap" label="Urgentes" value={kpis.urgentes} accent="#E07856" />
        <KpiCard icon="circle-dot" label="Normais" value={kpis.normais} accent="#5B9BD0" />
        <KpiCard icon="check-circle-2" label="Concluídas" value={kpis.concluidas} accent="#3FC3AE" />
        <KpiCard icon="clock" label="Pendentes" value={kpis.pendentes} accent="#E0B354" />
      </div>

      {demandasHoje.length === 0 ? (
        <Card>
          <EmptyState
            icon="inbox"
            title="Nenhuma demanda registrada hoje"
            subtitle="Quando novas demandas forem cadastradas com a data de hoje, elas aparecerão neste painel automaticamente."
            action={<Button icon="plus" variant="accent" onClick={() => setActive("demandas")}>Registrar demanda</Button>}
          />
        </Card>
      ) : !rechartsDisponivel ? (
        <Card>
          <EmptyState icon="file-bar-chart-2" title="Gráficos indisponíveis no momento" subtitle="A biblioteca de gráficos não pôde ser carregada (verifique a conexão com a internet). Os números acima continuam corretos." />
        </Card>
      ) : (
        <div id="charts-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <Card>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Por prioridade</h3>
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={porPrioridade}>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--line-soft)" vertical={false} />
                <XAxis dataKey="name" tick={{ fontSize: 11.5, fill: "var(--ink-soft)" }} axisLine={{ stroke: "var(--line)" }} tickLine={false} />
                <YAxis allowDecimals={false} tick={{ fontSize: 11.5, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ fontSize: 12.5, borderRadius: 8, border: "1px solid var(--line)", background: "var(--paper)", color: "var(--ink)" }} itemStyle={{ color: "var(--ink)" }} labelStyle={{ color: "var(--ink)" }} />
                <Bar dataKey="value" radius={[6, 6, 0, 0]}>
                  {porPrioridade.map((entry, i) => (
                    <Cell key={i} fill={entry.name === "Urgente" ? "#E07856" : entry.name === "Normal" ? "#5B9BD0" : "#8FA0B3"} />
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </Card>

          <Card>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Por status</h3>
            <ResponsiveContainer width="100%" height={220}>
              <PieChart>
                <Pie data={porStatus.filter(s => s.value > 0)} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={78} label={({ name, value }) => `${name}: ${value}`} labelLine={false} fontSize={11}>
                  {porStatus.filter(s => s.value > 0).map((entry, i) => <Cell key={i} fill={CORES_RESOLVED[i % CORES_RESOLVED.length]} />)}
                </Pie>
                <Tooltip contentStyle={{ fontSize: 12.5, borderRadius: 8, border: "1px solid var(--line)", background: "var(--paper)", color: "var(--ink)" }} itemStyle={{ color: "var(--ink)" }} labelStyle={{ color: "var(--ink)" }} />
              </PieChart>
            </ResponsiveContainer>
          </Card>

          <Card>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Por origem</h3>
            {porOrigem.length === 0 ? <p style={{ color: "var(--ink-soft)", fontSize: 13 }}>Sem dados de origem hoje.</p> : (
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={porOrigem} layout="vertical" margin={{ left: 8 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="var(--line-soft)" horizontal={false} />
                  <XAxis type="number" allowDecimals={false} tick={{ fontSize: 11.5, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
                  <YAxis type="category" dataKey="name" width={150} tick={{ fontSize: 11, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
                  <Tooltip contentStyle={{ fontSize: 12.5, borderRadius: 8, border: "1px solid var(--line)", background: "var(--paper)", color: "var(--ink)" }} itemStyle={{ color: "var(--ink)" }} labelStyle={{ color: "var(--ink)" }} />
                  <Bar dataKey="value" fill="var(--steel)" radius={[0, 6, 6, 0]} />
                </BarChart>
              </ResponsiveContainer>
            )}
          </Card>

          <Card>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Por responsável</h3>
            {porResponsavel.length === 0 ? <p style={{ color: "var(--ink-soft)", fontSize: 13 }}>Sem responsáveis atribuídos hoje.</p> : (
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={porResponsavel} layout="vertical" margin={{ left: 8 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="var(--line-soft)" horizontal={false} />
                  <XAxis type="number" allowDecimals={false} tick={{ fontSize: 11.5, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
                  <YAxis type="category" dataKey="name" width={150} tick={{ fontSize: 11, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
                  <Tooltip contentStyle={{ fontSize: 12.5, borderRadius: 8, border: "1px solid var(--line)", background: "var(--paper)", color: "var(--ink)" }} itemStyle={{ color: "var(--ink)" }} labelStyle={{ color: "var(--ink)" }} />
                  <Bar dataKey="value" fill="var(--gold)" radius={[0, 6, 6, 0]} />
                </BarChart>
              </ResponsiveContainer>
            )}
          </Card>
        </div>
      )}
    </div>
  );
}
