function FormularioDocumento({ doc, onSalvar, onCancelar }) {
  const toast = useToast();
  const [form, setForm] = useState(doc || {
    nome: "", tipo: TIPOS_DOCUMENTO[0], numero: "", data: hojeISO(),
    area: "", palavras_chave: "", observacoes: "", conteudo_texto: "", arquivo_nome: "", arquivo_url: "",
  });
  const [lendo, setLendo] = useState(false);
  const [salvando, setSalvando] = useState(false);

  async function handleArquivo(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setLendo(true);
    try {
      const [texto, enviado] = await Promise.all([extrairTextoDeArquivo(file), enviarArquivo(file, "documentos")]);
      setForm((f) => ({
        ...f,
        arquivo_nome: enviado.nome,
        arquivo_url: enviado.url,
        conteudo_texto: texto || f.conteudo_texto,
      }));
      if (texto) {
        toast(`Texto de "${file.name}" extraído automaticamente e indexado para busca.`, "success");
      } else {
        toast(`Arquivo "${file.name}" enviado. Não foi possível extrair texto automaticamente — cole o conteúdo relevante no campo abaixo para que ele fique pesquisável.`, "info");
      }
    } catch (err) {
      toast("Não foi possível enviar o arquivo: " + err.message, "error");
    } finally {
      setLendo(false);
    }
  }

  function validar() {
    if (!form.nome.trim()) { toast("Informe o nome do documento.", "error"); return false; }
    if (!form.conteudo_texto.trim() && !form.arquivo_nome) {
      toast("Anexe um arquivo (PDF ou texto) ou cole o conteúdo do documento — é esse texto que fica pesquisável na Base Normativa.", "error");
      return false;
    }
    return true;
  }

  async function salvar() {
    if (!validar()) return;
    setSalvando(true);
    try {
      await onSalvar(form);
    } catch (err) {
      toast("Não foi possível salvar: " + err.message, "error");
    } finally {
      setSalvando(false);
    }
  }

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 14 }}>
        <Field label="Nome do documento" required>
          <Input value={form.nome} onChange={(e) => setForm({ ...form, nome: e.target.value })} placeholder='Ex: "Resolução nº 12/2021 — Participação de gastos"' />
        </Field>
        <Field label="Tipo" required>
          <Select value={form.tipo} onChange={(e) => setForm({ ...form, tipo: e.target.value })}>
            {TIPOS_DOCUMENTO.map(t => <option key={t} value={t}>{t}</option>)}
          </Select>
        </Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
        <Field label="Número"><Input value={form.numero} onChange={(e) => setForm({ ...form, numero: e.target.value })} placeholder="Ex: 012/2021" /></Field>
        <Field label="Data"><Input type="date" value={form.data} onChange={(e) => setForm({ ...form, data: e.target.value })} /></Field>
        <Field label="Área relacionada"><Input value={form.area} onChange={(e) => setForm({ ...form, area: e.target.value })} placeholder="Ex: Saúde, Financeiro..." /></Field>
      </div>
      <Field label="Palavras-chave" hint="Separe por vírgula — ajuda a localizar o documento certo na busca por metadados.">
        <Input value={form.palavras_chave} onChange={(e) => setForm({ ...form, palavras_chave: e.target.value })} placeholder="Ex: gastos, participação, beneficiário" />
      </Field>
      <Field label="Observações">
        <Textarea rows={2} value={form.observacoes} onChange={(e) => setForm({ ...form, observacoes: e.target.value })} />
      </Field>

      <Field label="Arquivo" hint="PDFs têm o texto extraído e indexado automaticamente para busca. Arquivos .txt/.md também são lidos automaticamente.">
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <label style={{
            display: "inline-flex", alignItems: "center", gap: 7, padding: "9px 14px", borderRadius: 8,
            border: "1px solid var(--line)", background: "var(--pearl)", fontSize: 13.5, fontWeight: 600, color: "var(--steel-light)",
          }}>
            <Icon name="upload" size={15} />
            Escolher arquivo
            <input type="file" onChange={handleArquivo} style={{ display: "none" }} />
          </label>
          {lendo && <Spinner size={14} />}
          {form.arquivo_nome && !lendo && (
            <Badge bg="var(--teal-pale)" fg="var(--teal)"><Icon name="paperclip" size={12} />{form.arquivo_nome}</Badge>
          )}
        </div>
      </Field>

      <Field label="Conteúdo do documento (texto)" required hint="Este é o texto usado na busca interna de documentos. Para PDFs, é preenchido automaticamente; ajuste ou complemente se necessário.">
        <Textarea rows={8} value={form.conteudo_texto} onChange={(e) => setForm({ ...form, conteudo_texto: e.target.value })} placeholder="Cole aqui o texto do documento (artigos, itens, cláusulas)..." style={{ fontFamily: "var(--font-mono)", fontSize: 12.5 }} />
      </Field>

      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 6 }}>
        <Button variant="secondary" onClick={onCancelar}>Cancelar</Button>
        <Button variant="accent" icon="check" disabled={salvando} onClick={salvar}>{salvando ? <Spinner size={14} color="#fff" /> : "Salvar documento"}</Button>
      </div>
    </div>
  );
}

function BaseNormativa() {
  const { documentos, criarDocumento, atualizarDocumento, excluirDocumento } = useApp();
  const toast = useToast();
  const [modalAberto, setModalAberto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [filtroTipo, setFiltroTipo] = useState("Todos");
  const [busca, setBusca] = useState("");
  const [buscaConteudo, setBuscaConteudo] = useState("");
  const [verDoc, setVerDoc] = useState(null);
  const [confirmExcluir, setConfirmExcluir] = useState(null);

  const filtrados = useMemo(() => {
    return documentos.filter(d => {
      const matchTipo = filtroTipo === "Todos" || d.tipo === filtroTipo;
      const texto = `${d.nome} ${d.numero} ${d.palavras_chave} ${d.area}`.toLowerCase();
      const matchBusca = !busca.trim() || texto.includes(busca.toLowerCase());
      return matchTipo && matchBusca;
    }).sort((a, b) => (b.data || "").localeCompare(a.data || ""));
  }, [documentos, filtroTipo, busca]);

  const termosConteudo = useMemo(() => normalizarBusca(buscaConteudo).split(/\s+/).filter(Boolean), [buscaConteudo]);
  const resultadosConteudo = useMemo(() => {
    if (!buscaConteudo.trim()) return [];
    return buscarNoConteudoDocumentos(documentos, buscaConteudo);
  }, [documentos, buscaConteudo]);

  async function salvar(form) {
    if (editando) {
      await atualizarDocumento(editando.id, form);
      toast("Documento atualizado com sucesso.", "success");
    } else {
      await criarDocumento(form);
      toast("Documento cadastrado na base normativa.", "success");
    }
    setModalAberto(false);
    setEditando(null);
  }

  async function excluir(doc) {
    try {
      await excluirDocumento(doc.id);
      toast("Documento removido da base.", "info");
    } catch (e) {
      toast("Não foi possível remover: " + e.message, "error");
    }
    setConfirmExcluir(null);
  }

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Biblioteca normativa"
        title="Base Normativa"
        subtitle="Cadastre PAS, protocolos, deliberações, resoluções, portarias e demais normas. O texto de cada PDF é extraído e fica pesquisável abaixo."
        action={<Button icon="plus" variant="accent" onClick={() => { setEditando(null); setModalAberto(true); }}>Novo documento</Button>}
      />

      <Card style={{ marginBottom: 18 }}>
        <Field label="Buscar dentro dos documentos (conteúdo dos PDFs)" hint="Digite uma ou mais palavras-chave. A busca ignora maiúsculas/minúsculas e ordena os resultados pela quantidade de ocorrências.">
          <div style={{ position: "relative" }}>
            <Icon name="search" size={15} color="var(--ink-soft)" style={{ position: "absolute", left: 12, top: 12 }} />
            <Input value={buscaConteudo} onChange={(e) => setBuscaConteudo(e.target.value)} placeholder="Ex: participação de gastos, afastamento, licitação..." style={{ paddingLeft: 36 }} />
          </div>
        </Field>

        {buscaConteudo.trim() && (
          resultadosConteudo.length === 0 ? (
            <EmptyState icon="search-x" title="Nenhuma ocorrência encontrada" subtitle="Tente outras palavras-chave ou verifique se o documento tem texto indexado." />
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 4 }}>
              {resultadosConteudo.map(({ doc, ocorrencias, trecho }) => (
                <div key={doc.id} style={{ border: "1px solid var(--line)", borderRadius: 8, padding: "12px 14px", background: "var(--pearl)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 13.5, fontWeight: 700, color: "var(--heading)" }}>{doc.nome}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <Badge bg="var(--steel-pale)" fg="var(--steel)">{ocorrencias} ocorrência{ocorrencias > 1 ? "s" : ""}</Badge>
                      {doc.arquivo_url && (
                        <a href={doc.arquivo_url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
                          <Button size="sm" variant="secondary" icon="external-link">Abrir PDF</Button>
                        </a>
                      )}
                    </div>
                  </div>
                  <div style={{ fontSize: 12.5, lineHeight: 1.6, color: "var(--ink-soft)", fontFamily: "var(--font-mono)" }}>
                    {partesComDestaque(trecho, termosConteudo).map((parte, i) =>
                      termosConteudo.some(t => normalizarBusca(parte) === t)
                        ? <mark key={i} style={{ background: "var(--amber-pale)", color: "var(--amber)", padding: "0 2px", borderRadius: 3 }}>{parte}</mark>
                        : <span key={i}>{parte}</span>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )
        )}
      </Card>

      <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
        <div style={{ position: "relative", flex: "1 1 240px" }}>
          <Icon name="search" size={15} color="var(--ink-soft)" style={{ position: "absolute", left: 12, top: 12 }} />
          <Input value={busca} onChange={(e) => setBusca(e.target.value)} placeholder="Buscar por nome, número, palavra-chave..." style={{ paddingLeft: 36 }} />
        </div>
        <Select value={filtroTipo} onChange={(e) => setFiltroTipo(e.target.value)} style={{ width: 200, flexShrink: 0 }}>
          <option value="Todos">Todos os tipos</option>
          {TIPOS_DOCUMENTO.map(t => <option key={t} value={t}>{t}</option>)}
        </Select>
      </div>

      {documentos.length === 0 ? (
        <Card>
          <EmptyState
            icon="library"
            title="Nenhum documento cadastrado"
            subtitle="Cadastre PAS, protocolos, deliberações, resoluções, portarias e demais normas. O texto de cada PDF é extraído automaticamente e fica pesquisável."
            action={<Button icon="plus" variant="accent" onClick={() => setModalAberto(true)}>Cadastrar primeiro documento</Button>}
          />
        </Card>
      ) : filtrados.length === 0 ? (
        <Card><EmptyState icon="search-x" title="Nenhum resultado" subtitle="Ajuste os filtros ou o termo de busca." /></Card>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>
          {filtrados.map((doc) => (
            <Card key={doc.id} style={{ display: "flex", flexDirection: "column" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 10 }}>
                <Badge bg="var(--steel-pale)" fg="var(--steel)">{doc.tipo}</Badge>
                {doc.conteudo_texto ? (
                  <span title="Texto indexado para busca"><Icon name="file-check-2" size={15} color="var(--teal)" /></span>
                ) : (
                  <span title="Sem texto extraído — não aparece na busca de conteúdo"><Icon name="search-x" size={15} color="var(--ink-soft)" /></span>
                )}
              </div>
              <h3 style={{ fontFamily: "var(--font-display)", fontSize: 15.5, color: "var(--heading)", margin: "0 0 6px", lineHeight: 1.3 }}>{doc.nome}</h3>
              <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginBottom: 10, display: "flex", flexDirection: "column", gap: 3 }}>
                {doc.numero && <span>Nº {doc.numero}</span>}
                <span>{formatarData(doc.data)}{doc.area ? ` · ${doc.area}` : ""}</span>
              </div>
              {doc.palavras_chave && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 12 }}>
                  {doc.palavras_chave.split(",").map(p => p.trim()).filter(Boolean).slice(0, 4).map((p, i) => (
                    <span key={i} style={{ fontSize: 11, color: "var(--ink-soft)", background: "var(--pearl)", padding: "2px 8px", borderRadius: 12 }}>{p}</span>
                  ))}
                </div>
              )}
              <div style={{ marginTop: "auto", display: "flex", gap: 6 }}>
                <Button size="sm" variant="secondary" icon="eye" onClick={() => setVerDoc(doc)} style={{ flex: 1 }}>Ver</Button>
                <Button size="sm" variant="ghost" icon="pencil" onClick={() => { setEditando(doc); setModalAberto(true); }} />
                <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmExcluir(doc)} style={{ color: "var(--terracotta)" }} />
              </div>
            </Card>
          ))}
        </div>
      )}

      <Modal open={modalAberto} onClose={() => { setModalAberto(false); setEditando(null); }} title={editando ? "Editar documento" : "Novo documento normativo"} width={680}>
        <FormularioDocumento doc={editando} onSalvar={salvar} onCancelar={() => { setModalAberto(false); setEditando(null); }} />
      </Modal>

      <Modal open={!!verDoc} onClose={() => setVerDoc(null)} title={verDoc ? verDoc.nome : ""} width={700}>
        {verDoc && (
          <div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
              <Badge bg="var(--steel-pale)" fg="var(--steel)">{verDoc.tipo}</Badge>
              {verDoc.numero && <Badge bg="var(--pearl)" fg="var(--ink-soft)">Nº {verDoc.numero}</Badge>}
              <Badge bg="var(--pearl)" fg="var(--ink-soft)">{formatarData(verDoc.data)}</Badge>
              {verDoc.area && <Badge bg="var(--pearl)" fg="var(--ink-soft)">{verDoc.area}</Badge>}
              {verDoc.arquivo_url && (
                <a href={verDoc.arquivo_url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
                  <Badge bg="var(--teal-pale)" fg="var(--teal)"><Icon name="external-link" size={11} />Abrir arquivo original</Badge>
                </a>
              )}
            </div>
            {verDoc.observacoes && <p style={{ fontSize: 13.5, color: "var(--ink-soft)", marginBottom: 14 }}>{verDoc.observacoes}</p>}
            <div style={{ fontSize: 12, fontWeight: 700, color: "var(--heading)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>Conteúdo indexado para busca</div>
            <div style={{
              fontFamily: "var(--font-mono)", fontSize: 12.5, lineHeight: 1.6, whiteSpace: "pre-wrap",
              background: "var(--pearl)", borderRadius: 8, padding: 14, maxHeight: 360, overflow: "auto", color: "var(--ink)",
            }}>
              {verDoc.conteudo_texto || "Nenhum texto foi extraído deste documento. Ele não aparecerá na busca de conteúdo até que o texto seja colado no cadastro."}
            </div>
          </div>
        )}
      </Modal>

      <Modal open={!!confirmExcluir} onClose={() => setConfirmExcluir(null)} title="Remover documento" width={420}>
        {confirmExcluir && (
          <div>
            <p style={{ fontSize: 14, color: "var(--ink)", lineHeight: 1.5 }}>
              Tem certeza que deseja remover <strong>{confirmExcluir.nome}</strong> da base normativa? Ele deixará de aparecer na busca de conteúdo.
            </p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <Button variant="secondary" onClick={() => setConfirmExcluir(null)}>Cancelar</Button>
              <Button variant="danger" icon="trash-2" onClick={() => excluir(confirmExcluir)}>Remover</Button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}


/* ============================================================
   MÓDULO: ASSISTENTE DE REDAÇÃO
   O usuário digita o texto, escolhe uma operação, e o sistema
   abre o ChatGPT em nova aba já com o texto e a instrução da
   operação escolhida preenchidos. Nenhum processamento é feito
   dentro deste sistema — quem gera o texto é o ChatGPT.
============================================================ */

const OPERACOES_ASSISTENTE = [
  {
    id: "oficio_sei",
    label: "Gerar Ofício no SEI",
    icon: "landmark",
    instrucao: "Redija este conteúdo como um Ofício, no padrão de formatação usado no sistema SEI (Sistema Eletrônico de Informações), com cabeçalho, corpo e fecho formais, em linguagem administrativa. Não invente números de processo, datas, nomes ou fatos que não estejam no texto original.",
  },
  {
    id: "memorando_sei",
    label: "Gerar Memorando no SEI",
    icon: "landmark",
    instrucao: "Redija este conteúdo como um Memorando, no padrão de formatação usado no sistema SEI (Sistema Eletrônico de Informações), com cabeçalho, corpo e fecho formais, em linguagem administrativa. Não invente números de processo, datas, nomes ou fatos que não estejam no texto original.",
  },
  {
    id: "corrigir",
    label: "Corrigir Português",
    icon: "spell-check",
    instrucao: "Corrija a ortografia, a gramática e a pontuação deste texto, mantendo o sentido original e o mesmo nível de formalidade. Não altere fatos, datas, valores ou nomes.",
  },
  {
    id: "humanizar",
    label: "Humanizar Texto",
    icon: "heart-handshake",
    instrucao: "Reescreva este texto deixando-o com um tom mais humano e natural, mantendo a formalidade administrativa apropriada ao contexto, sem inventar fatos novos.",
  },
];

// Só entram na lista as IAs que realmente aceitam receber o texto pronto
// por link. Gemini nunca teve esse recurso; a Anthropic removeu do Claude.ai
// em out/2025 por segurança; o Copilot quebrou esse recurso e não voltou —
// nelas a aba abriria em branco, o que não tem utilidade real aqui.
const DESTINOS_IA = [
  { id: "chatgpt", label: "ChatGPT", url: "https://chat.openai.com", prefill: (t) => "https://chatgpt.com/?q=" + encodeURIComponent(t) },
  { id: "perplexity", label: "Perplexity", url: "https://www.perplexity.ai", prefill: (t) => "https://www.perplexity.ai/search?q=" + encodeURIComponent(t) },
];

function AssistenteRedacao() {
  const { documentos } = useApp();
  const toast = useToast();
  const [textoOriginal, setTextoOriginal] = useState("");
  const [operacao, setOperacao] = useState(OPERACOES_ASSISTENTE[0].id);
  const [destinoId, setDestinoId] = useState(DESTINOS_IA[0].id);
  const [buscouDUT, setBuscouDUT] = useState(false);

  function abrirNaIA() {
    if (!textoOriginal.trim()) { toast("Cole o texto que deseja trabalhar.", "error"); return; }
    const op = OPERACOES_ASSISTENTE.find((o) => o.id === operacao);
    const destino = DESTINOS_IA.find((d) => d.id === destinoId);
    const instrucaoCompleta = `${op.instrucao}\n\nTexto original:\n"""\n${textoOriginal}\n"""`;

    if (!destino.prefill) {
      toast(`${destino.label} não aceita receber o texto pronto por link — a aba abrirá em branco, cole o texto lá.`, "info");
      window.open(destino.url, "_blank");
      return;
    }
    if (instrucaoCompleta.length > 1800) {
      toast("Texto muito longo para preencher automaticamente. A aba abrirá em branco — copie e cole o texto lá.", "info");
      window.open(destino.url, "_blank");
      return;
    }
    window.open(destino.prefill(instrucaoCompleta), "_blank");
  }

  const documentosDUT = useMemo(() => documentos.filter((d) => d.tipo === "DUT (ANS)"), [documentos]);
  const termosDUT = useMemo(() => normalizarBusca(textoOriginal).split(/\s+/).filter(Boolean), [textoOriginal]);
  const resultadosDUT = useMemo(() => {
    if (!buscouDUT || !textoOriginal.trim()) return [];
    return buscarNoConteudoDocumentos(documentosDUT, textoOriginal);
  }, [buscouDUT, textoOriginal, documentosDUT]);

  function verificarDUT() {
    if (!textoOriginal.trim()) { toast("Descreva o exame, cirurgia ou medicamento no campo de texto para buscar nas DUTs.", "error"); return; }
    if (documentosDUT.length === 0) {
      toast("Nenhuma DUT cadastrada ainda. Cadastre os PDFs das Diretrizes de Utilização Técnica na Base Normativa (tipo \"DUT (ANS)\") para poder consultá-las aqui.", "error");
      setBuscouDUT(false);
      return;
    }
    setBuscouDUT(true);
  }

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Redação institucional"
        title="Assistente de Redação"
        subtitle="Cole o texto, escolha a operação e a IA de preferência — ou consulte as DUTs cadastradas."
      />

      <Card style={{ marginBottom: 18 }}>
        <Field label="Texto Original">
          <Textarea rows={12} value={textoOriginal} onChange={(e) => { setTextoOriginal(e.target.value); setBuscouDUT(false); }} placeholder="Cole aqui o texto a ser trabalhado, ou descreva o exame/cirurgia/medicamento para consultar as DUTs..." />
        </Field>

        <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--ink-soft)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 10 }}>Escolha uma operação</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 18 }}>
          {OPERACOES_ASSISTENTE.map((op) => (
            <button
              key={op.id}
              onClick={() => setOperacao(op.id)}
              style={{
                display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", borderRadius: 8,
                border: "1px solid " + (operacao === op.id ? "var(--steel)" : "var(--line)"),
                background: operacao === op.id ? "var(--steel-pale)" : "var(--paper)",
                fontSize: 13, fontWeight: 600, color: operacao === op.id ? "var(--steel)" : "var(--ink)",
                textAlign: "left",
              }}
            >
              <Icon name={op.icon} size={15} />
              {op.label}
            </button>
          ))}
        </div>

        <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--ink-soft)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 10 }}>Abrir em</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
          {DESTINOS_IA.map((d) => (
            <button
              key={d.id}
              onClick={() => setDestinoId(d.id)}
              style={{
                display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 999,
                border: "1px solid " + (destinoId === d.id ? "var(--steel)" : "var(--line)"),
                background: destinoId === d.id ? "var(--steel-pale)" : "var(--paper)",
                fontSize: 13, fontWeight: 600, color: destinoId === d.id ? "var(--steel)" : "var(--ink)",
              }}
            >
              {d.label}
            </button>
          ))}
        </div>

        <div style={{ display: "flex", justifyContent: "flex-end" }}>
          <Button variant="accent" icon="external-link" onClick={abrirNaIA}>Usar {DESTINOS_IA.find((d) => d.id === destinoId).label}</Button>
        </div>

        <div style={{ marginTop: 18, paddingTop: 16, borderTop: "1px solid var(--line-soft)" }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: "var(--ink-soft)", textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 6 }}>
            Ou consulte as Diretrizes de Utilização (DUT)
          </div>
          <p style={{ fontSize: 12, color: "var(--ink-soft)", margin: "0 0 10px", lineHeight: 1.5 }}>
            Busca apenas dentro dos PDFs de DUT (ANS) já cadastrados na Base Normativa — não usa o ChatGPT nem inventa critério algum.
          </p>
          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <Button variant="secondary" icon="search" onClick={verificarDUT}>O que a DUT fala sobre isso</Button>
          </div>
        </div>
      </Card>

      {buscouDUT && (
        resultadosDUT.length === 0 ? (
          <Card><EmptyState icon="search-x" title="Nenhuma ocorrência encontrada nas DUTs cadastradas" subtitle="Tente descrever o procedimento com outras palavras, ou verifique se a DUT relevante já foi cadastrada na Base Normativa." /></Card>
        ) : (
          <Card>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Trechos encontrados nas DUTs</h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {resultadosDUT.map(({ doc, ocorrencias, trecho }) => (
                <div key={doc.id} style={{ border: "1px solid var(--line)", borderRadius: 8, padding: "12px 14px", background: "var(--pearl)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 13.5, fontWeight: 700, color: "var(--heading)" }}>{doc.nome}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <Badge bg="var(--steel-pale)" fg="var(--steel)">{ocorrencias} ocorrência{ocorrencias > 1 ? "s" : ""}</Badge>
                      {doc.arquivo_url && (
                        <a href={doc.arquivo_url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
                          <Button size="sm" variant="secondary" icon="external-link">Abrir PDF</Button>
                        </a>
                      )}
                    </div>
                  </div>
                  <div style={{ fontSize: 12.5, lineHeight: 1.6, color: "var(--ink-soft)", fontFamily: "var(--font-mono)" }}>
                    {partesComDestaque(trecho, termosDUT).map((parte, i) =>
                      termosDUT.some(t => normalizarBusca(parte) === t)
                        ? <mark key={i} style={{ background: "var(--amber-pale)", color: "var(--amber)", padding: "0 2px", borderRadius: 3 }}>{parte}</mark>
                        : <span key={i}>{parte}</span>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        )
      )}
    </div>
  );
}

/* ============================================================
   MÓDULO: GESTÃO DE DEMANDAS
============================================================ */

function FormularioDemanda({ demanda, onSalvar, onCancelar, usuarioAtual }) {
  const toast = useToast();
  const { usuarios } = useApp();
  const isEdicao = !!demanda;
  const [form, setForm] = useState(demanda || {
    data: hojeISO(), hora: agoraHoraBR(),
    solicitante: "", origem: ORIGENS_DEMANDA[0], classificacao: CLASSIFICACOES_DEMANDA[0],
    responsavel: usuarioAtual ? nomeCompletoUsuario(usuarioAtual) : "", assunto: "", descricao: "", prazo: "", data_agendada: "", status: STATUS_DEMANDA[0],
    prioridade: PRIORIDADES[1], observacoes: "", anexo_nome: "", anexo_url: "", resposta_final: "",
    usuario_criador_id: usuarioAtual ? usuarioAtual.id : null,
  });
  const [lendoAnexo, setLendoAnexo] = useState(false);
  const [salvando, setSalvando] = useState(false);

  async function handleAnexo(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setLendoAnexo(true);
    try {
      const enviado = await enviarArquivo(file, "demandas");
      setForm((f) => ({ ...f, anexo_nome: enviado.nome, anexo_url: enviado.url }));
    } catch (err) {
      toast("Não foi possível enviar o anexo: " + err.message, "error");
    } finally {
      setLendoAnexo(false);
    }
  }

  function validar() {
    if (!form.solicitante.trim()) { toast("Informe o solicitante.", "error"); return false; }
    if (!form.assunto.trim()) { toast("Informe o assunto.", "error"); return false; }
    return true;
  }

  async function salvar() {
    if (!validar()) return;
    setSalvando(true);
    try {
      await onSalvar(form);
    } catch (err) {
      toast("Não foi possível salvar: " + err.message, "error");
    } finally {
      setSalvando(false);
    }
  }

  return (
    <div>
      {isEdicao && (
        <div style={{ marginBottom: 16 }}>
          <Badge bg="var(--steel-pale)" fg="var(--steel)">{form.numero}</Badge>
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="Data"><Input type="date" value={form.data} onChange={(e) => setForm({ ...form, data: e.target.value })} /></Field>
        <Field label="Hora"><Input type="time" value={form.hora} onChange={(e) => setForm({ ...form, hora: e.target.value })} /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="Solicitante" required><Input value={form.solicitante} onChange={(e) => setForm({ ...form, solicitante: e.target.value })} placeholder="Nome de quem solicitou" /></Field>
        <Field label="Responsável" hint="Atribua a demanda a alguém da equipe.">
          <Select value={form.responsavel} onChange={(e) => setForm({ ...form, responsavel: e.target.value })}>
            <option value="">Sem responsável definido</option>
            {usuarios.filter(u => u.ativo !== false).map(u => (
              <option key={u.id} value={nomeCompletoUsuario(u)}>{nomeCompletoUsuario(u)}</option>
            ))}
          </Select>
        </Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
        <Field label="Origem">
          <Select value={form.origem} onChange={(e) => setForm({ ...form, origem: e.target.value })}>
            {ORIGENS_DEMANDA.map(o => <option key={o} value={o}>{o}</option>)}
          </Select>
        </Field>
        <Field label="Classificação">
          <Select value={form.classificacao} onChange={(e) => setForm({ ...form, classificacao: e.target.value })}>
            {CLASSIFICACOES_DEMANDA.map(c => <option key={c} value={c}>{c}</option>)}
          </Select>
        </Field>
        <Field label="Prioridade">
          <Select value={form.prioridade} onChange={(e) => setForm({ ...form, prioridade: e.target.value })}>
            {PRIORIDADES.map(p => <option key={p} value={p}>{p}</option>)}
          </Select>
        </Field>
      </div>
      <Field label="Assunto" required><Input value={form.assunto} onChange={(e) => setForm({ ...form, assunto: e.target.value })} /></Field>
      <Field label="Descrição"><Textarea rows={4} value={form.descricao} onChange={(e) => setForm({ ...form, descricao: e.target.value })} /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="Prazo"><Input type="date" value={form.prazo} onChange={(e) => setForm({ ...form, prazo: e.target.value })} /></Field>
        <Field label="Data agendada" hint="Data de consulta/cirurgia/exame — usada no calendário, é diferente do prazo.">
          <Input type="date" value={form.data_agendada} onChange={(e) => setForm({ ...form, data_agendada: e.target.value })} />
        </Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="Status">
          <Select value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
            {STATUS_DEMANDA.map(s => <option key={s} value={s}>{s}</option>)}
          </Select>
        </Field>
      </div>
      <Field label="Anexo">
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <label style={{
            display: "inline-flex", alignItems: "center", gap: 7, padding: "9px 14px", borderRadius: 8,
            border: "1px solid var(--line)", background: "var(--pearl)", fontSize: 13.5, fontWeight: 600, color: "var(--steel-light)",
          }}>
            <Icon name="paperclip" size={15} /> Anexar arquivo
            <input type="file" onChange={handleAnexo} style={{ display: "none" }} />
          </label>
          {lendoAnexo && <Spinner size={14} />}
          {form.anexo_nome && !lendoAnexo && <Badge bg="var(--teal-pale)" fg="var(--teal)">{form.anexo_nome}</Badge>}
        </div>
      </Field>
      <Field label="Observações"><Textarea rows={2} value={form.observacoes} onChange={(e) => setForm({ ...form, observacoes: e.target.value })} /></Field>
      <Field label="Resposta final"><Textarea rows={3} value={form.resposta_final} onChange={(e) => setForm({ ...form, resposta_final: e.target.value })} placeholder="Preencha quando a demanda for concluída" /></Field>

      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 6 }}>
        <Button variant="secondary" onClick={onCancelar}>Cancelar</Button>
        <Button variant="accent" icon="check" disabled={salvando} onClick={salvar}>{salvando ? <Spinner size={14} color="#fff" /> : (isEdicao ? "Salvar alterações" : "Registrar demanda")}</Button>
      </div>
    </div>
  );
}

function GestaoDemandas() {
  const { demandas, criarDemanda, atualizarDemanda, excluirDemanda, atualizarStatusDemanda, usuarioAtual } = useApp();
  const toast = useToast();
  const [modalAberto, setModalAberto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [verDemanda, setVerDemanda] = useState(null);
  const [confirmExcluir, setConfirmExcluir] = useState(null);
  const [busca, setBusca] = useState("");
  const [filtroStatus, setFiltroStatus] = useState("Todos");
  const [filtroOrigem, setFiltroOrigem] = useState("Todas");
  const [filtroPrioridade, setFiltroPrioridade] = useState("Todas");
  const [mostrarArquivadas, setMostrarArquivadas] = useState(false);

  const ehArquivada = (d) => d.status === "Concluída" || d.status === "Cancelada";
  const totalArquivadas = useMemo(() => demandas.filter(ehArquivada).length, [demandas]);

  const filtradas = useMemo(() => {
    return demandas.filter(d => {
      if (!mostrarArquivadas && ehArquivada(d)) return false;
      const matchBusca = !busca.trim() || `${d.assunto} ${d.solicitante} ${d.numero} ${d.responsavel}`.toLowerCase().includes(busca.toLowerCase());
      const matchStatus = filtroStatus === "Todos" || d.status === filtroStatus;
      const matchOrigem = filtroOrigem === "Todas" || d.origem === filtroOrigem;
      const matchPrioridade = filtroPrioridade === "Todas" || d.prioridade === filtroPrioridade;
      return matchBusca && matchStatus && matchOrigem && matchPrioridade;
    }).sort((a, b) => (b.data_criacao || "").localeCompare(a.data_criacao || ""));
  }, [demandas, busca, filtroStatus, filtroOrigem, filtroPrioridade, mostrarArquivadas]);

  async function salvar(form) {
    if (editando) {
      await atualizarDemanda(editando.id, form);
      toast("Demanda atualizada.", "success");
    } else {
      await criarDemanda(form);
      toast("Demanda registrada.", "success");
    }
    setModalAberto(false);
    setEditando(null);
  }

  async function excluir(d) {
    try {
      await excluirDemanda(d.id);
      toast("Demanda removida.", "info");
    } catch (e) {
      toast("Não foi possível remover: " + e.message, "error");
    }
    setConfirmExcluir(null);
  }

  async function mudarStatusRapido(d, novoStatus) {
    try {
      await atualizarStatusDemanda(d.id, novoStatus);
      toast(`Status atualizado para "${novoStatus}".`, "success");
    } catch (e) {
      toast("Não foi possível atualizar o status: " + e.message, "error");
    }
  }

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Controle operacional"
        title="Gestão de Demandas"
        subtitle="Registre, acompanhe e conclua as demandas diárias da assessoria."
        action={<Button icon="plus" variant="accent" onClick={() => { setEditando(null); setModalAberto(true); }}>Nova demanda</Button>}
      />

      <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
        <div style={{ position: "relative", flex: "1 1 220px" }}>
          <Icon name="search" size={15} color="var(--ink-soft)" style={{ position: "absolute", left: 12, top: 12 }} />
          <Input value={busca} onChange={(e) => setBusca(e.target.value)} placeholder="Buscar por assunto, solicitante, número..." style={{ paddingLeft: 36 }} />
        </div>
        <Select value={filtroStatus} onChange={(e) => setFiltroStatus(e.target.value)} style={{ width: 170, flexShrink: 0 }}>
          <option value="Todos">Todos os status</option>
          {STATUS_DEMANDA.map(s => <option key={s} value={s}>{s}</option>)}
        </Select>
        <Select value={filtroOrigem} onChange={(e) => setFiltroOrigem(e.target.value)} style={{ width: 190, flexShrink: 0 }}>
          <option value="Todas">Todas as origens</option>
          {ORIGENS_DEMANDA.map(o => <option key={o} value={o}>{o}</option>)}
        </Select>
        <Select value={filtroPrioridade} onChange={(e) => setFiltroPrioridade(e.target.value)} style={{ width: 160, flexShrink: 0 }}>
          <option value="Todas">Todas prioridades</option>
          {PRIORIDADES.map(p => <option key={p} value={p}>{p}</option>)}
        </Select>
        <button
          onClick={() => setMostrarArquivadas((v) => !v)}
          title="Demandas concluídas ou canceladas saem da lista automaticamente. Clique para ver/ocultar."
          style={{
            display: "flex", alignItems: "center", gap: 7, padding: "0 14px", borderRadius: 8,
            border: "1px solid " + (mostrarArquivadas ? "var(--steel)" : "var(--line)"),
            background: mostrarArquivadas ? "var(--steel-pale)" : "var(--paper)",
            fontSize: 13, fontWeight: 600, color: mostrarArquivadas ? "var(--steel)" : "var(--ink-soft)",
            flexShrink: 0,
          }}
        >
          <Icon name="archive" size={14} />
          {mostrarArquivadas ? "Ocultar arquivadas" : "Mostrar arquivadas"}
          {totalArquivadas > 0 && (
            <Badge bg={mostrarArquivadas ? "var(--steel)" : "var(--pearl)"} fg={mostrarArquivadas ? "#fff" : "var(--ink-soft)"}>{totalArquivadas}</Badge>
          )}
        </button>
      </div>

      {demandas.length === 0 ? (
        <Card>
          <EmptyState icon="list-checks" title="Nenhuma demanda registrada" subtitle="Cadastre a primeira demanda da assessoria para começar a acompanhar o fluxo de trabalho diário." action={<Button icon="plus" variant="accent" onClick={() => setModalAberto(true)}>Registrar demanda</Button>} />
        </Card>
      ) : filtradas.length === 0 ? (
        <Card>
          <EmptyState
            icon="search-x"
            title="Nenhum resultado"
            subtitle={!mostrarArquivadas && totalArquivadas > 0
              ? `Todas as demandas que batem com esse filtro estão arquivadas (concluídas/canceladas). Clique em "Mostrar arquivadas" acima para vê-las.`
              : "Ajuste os filtros ou o termo de busca."}
          />
        </Card>
      ) : (
        <div id="demandas-table-wrap" style={{ overflowX: "auto", border: "1px solid var(--line)", borderRadius: 12, background: "var(--paper)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5 }}>
            <thead>
              <tr style={{ background: "var(--pearl)", textAlign: "left" }}>
                {["Número", "Data", "Solicitante", "Origem", "Assunto", "Responsável", "Prioridade", "Status", "Prazo", ""].map((h) => (
                  <th key={h} style={{ padding: "11px 14px", fontSize: 11.5, fontWeight: 700, color: "var(--ink-soft)", textTransform: "uppercase", letterSpacing: "0.03em", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtradas.map((d) => (
                <tr key={d.id} style={{ borderTop: "1px solid var(--line-soft)" }}>
                  <td style={{ padding: "10px 14px", fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--ink-soft)" }}>{d.numero}</td>
                  <td style={{ padding: "10px 14px", whiteSpace: "nowrap" }}>{formatarData(d.data)}</td>
                  <td style={{ padding: "10px 14px" }}>{d.solicitante}</td>
                  <td style={{ padding: "10px 14px" }}>{d.origem}</td>
                  <td style={{ padding: "10px 14px", maxWidth: 220, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.assunto}</td>
                  <td style={{ padding: "10px 14px" }}>{d.responsavel || "—"}</td>
                  <td style={{ padding: "10px 14px" }}><PrioridadeBadge prioridade={d.prioridade} /></td>
                  <td style={{ padding: "10px 14px" }}>
                    <select value={d.status} onChange={(e) => mudarStatusRapido(d, e.target.value)} style={{
                      border: "none", background: COR_STATUS[d.status]?.bg, color: COR_STATUS[d.status]?.fg,
                      borderRadius: 20, padding: "4px 9px", fontSize: 12, fontWeight: 600,
                    }}>
                      {STATUS_DEMANDA.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </td>
                  <td style={{ padding: "10px 14px", whiteSpace: "nowrap", color: d.prazo && d.prazo < hojeISO() && !["Concluída", "Cancelada"].includes(d.status) ? "var(--terracotta)" : "var(--ink)" }}>
                    {d.prazo ? formatarData(d.prazo) : "—"}
                  </td>
                  <td style={{ padding: "10px 14px", display: "flex", gap: 4 }}>
                    <Button size="sm" variant="ghost" icon="eye" onClick={() => setVerDemanda(d)} />
                    <Button size="sm" variant="ghost" icon="pencil" onClick={() => { setEditando(d); setModalAberto(true); }} />
                    <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmExcluir(d)} style={{ color: "var(--terracotta)" }} />
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      <Modal open={modalAberto} onClose={() => { setModalAberto(false); setEditando(null); }} title={editando ? `Editar demanda ${editando.numero}` : "Nova demanda"} width={680}>
        <FormularioDemanda demanda={editando} onSalvar={salvar} onCancelar={() => { setModalAberto(false); setEditando(null); }} usuarioAtual={usuarioAtual} />
      </Modal>

      <Modal open={!!verDemanda} onClose={() => setVerDemanda(null)} title={verDemanda ? `Demanda ${verDemanda.numero}` : ""} width={620}>
        {verDemanda && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12, fontSize: 13.5 }}>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <PrioridadeBadge prioridade={verDemanda.prioridade} />
              <StatusBadge status={verDemanda.status} />
              <Badge bg="var(--pearl)" fg="var(--ink-soft)">{verDemanda.classificacao}</Badge>
            </div>
            <div><strong>Assunto:</strong> {verDemanda.assunto}</div>
            <div><strong>Solicitante:</strong> {verDemanda.solicitante} ({verDemanda.origem})</div>
            <div><strong>Responsável:</strong> {verDemanda.responsavel || "Não atribuído"}</div>
            <div><strong>Data/hora:</strong> {formatarData(verDemanda.data)} às {verDemanda.hora || "—"}</div>
            <div><strong>Prazo:</strong> {verDemanda.prazo ? formatarData(verDemanda.prazo) : "—"}</div>
            {verDemanda.descricao && <div><strong>Descrição:</strong><p style={{ marginTop: 4, color: "var(--ink-soft)" }}>{verDemanda.descricao}</p></div>}
            {verDemanda.observacoes && <div><strong>Observações:</strong><p style={{ marginTop: 4, color: "var(--ink-soft)" }}>{verDemanda.observacoes}</p></div>}
            {verDemanda.resposta_final && <div><strong>Resposta final:</strong><p style={{ marginTop: 4, color: "var(--ink-soft)" }}>{verDemanda.resposta_final}</p></div>}
            {verDemanda.anexo_url && (
              <div>
                <strong>Anexo:</strong>{" "}
                <a href={verDemanda.anexo_url} target="_blank" rel="noopener noreferrer" style={{ color: "var(--steel-light)" }}>{verDemanda.anexo_nome || "Abrir anexo"}</a>
              </div>
            )}
          </div>
        )}
      </Modal>

      <Modal open={!!confirmExcluir} onClose={() => setConfirmExcluir(null)} title="Remover demanda" width={420}>
        {confirmExcluir && (
          <div>
            <p style={{ fontSize: 14, lineHeight: 1.5 }}>Remover a demanda <strong>{confirmExcluir.numero}</strong> ({confirmExcluir.assunto})? Esta ação não pode ser desfeita.</p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <Button variant="secondary" onClick={() => setConfirmExcluir(null)}>Cancelar</Button>
              <Button variant="danger" icon="trash-2" onClick={() => excluir(confirmExcluir)}>Remover</Button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

   MÓDULO: RELATÓRIOS
============================================================ */

function aplicarFiltrosRelatorio(demandas, f) {
  return demandas.filter(d => {
    if (f.dataInicio && (d.data || "") < f.dataInicio) return false;
    if (f.dataFim && (d.data || "") > f.dataFim) return false;
    if (f.origem !== "Todas" && d.origem !== f.origem) return false;
    if (f.prioridade !== "Todas" && d.prioridade !== f.prioridade) return false;
    if (f.status !== "Todos" && d.status !== f.status) return false;
    if (f.responsavel.trim() && !(d.responsavel || "").toLowerCase().includes(f.responsavel.toLowerCase())) return false;
    if (f.assunto.trim() && !(d.assunto || "").toLowerCase().includes(f.assunto.toLowerCase())) return false;
    return true;
  });
}

function exportarCSV(dados, nomeArquivo) {
  const colunas = ["numero", "data", "hora", "solicitante", "origem", "classificacao", "responsavel", "assunto", "descricao", "prazo", "status", "prioridade", "observacoes", "resposta_final"];
  const cabecalho = ["Número", "Data", "Hora", "Solicitante", "Origem", "Classificação", "Responsável", "Assunto", "Descrição", "Prazo", "Status", "Prioridade", "Observações", "Resposta final"];
  function escapar(v) {
    const s = (v === undefined || v === null) ? "" : String(v);
    if (s.includes(",") || s.includes('"') || s.includes("\n")) return `"${s.replace(/"/g, '""')}"`;
    return s;
  }
  const linhas = [cabecalho.join(",")].concat(
    dados.map(d => colunas.map(c => escapar(d[c])).join(","))
  );
  const blob = new Blob(["\uFEFF" + linhas.join("\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = nomeArquivo;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportarExcel(dados, nomeArquivo) {
  if (typeof XLSX === "undefined") return false;
  const colunas = [
    { k: "numero", l: "Número" }, { k: "data", l: "Data" }, { k: "hora", l: "Hora" },
    { k: "solicitante", l: "Solicitante" }, { k: "origem", l: "Origem" }, { k: "classificacao", l: "Classificação" },
    { k: "responsavel", l: "Responsável" }, { k: "assunto", l: "Assunto" }, { k: "descricao", l: "Descrição" },
    { k: "prazo", l: "Prazo" }, { k: "status", l: "Status" }, { k: "prioridade", l: "Prioridade" },
    { k: "observacoes", l: "Observações" }, { k: "resposta_final", l: "Resposta final" },
  ];
  const linhas = dados.map(d => {
    const obj = {};
    colunas.forEach(c => { obj[c.l] = d[c.k] || ""; });
    return obj;
  });
  try {
    const ws = XLSX.utils.json_to_sheet(linhas);
    ws["!cols"] = colunas.map(() => ({ wch: 18 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Demandas");
    XLSX.writeFile(wb, nomeArquivo);
    return true;
  } catch (e) {
    return false;
  }
}

function exportarPDF(dados, filtrosResumo) {
  const linhas = dados.map(d => `
    <tr>
      <td>${d.numero || ""}</td>
      <td>${formatarData(d.data)}</td>
      <td>${(d.solicitante || "").replace(/</g, "&lt;")}</td>
      <td>${d.origem || ""}</td>
      <td>${(d.assunto || "").replace(/</g, "&lt;")}</td>
      <td>${d.responsavel || "—"}</td>
      <td>${d.prioridade || ""}</td>
      <td>${d.status || ""}</td>
      <td>${d.prazo ? formatarData(d.prazo) : "—"}</td>
      <td>${(d.observacoes || "—").toString().replace(/</g, "&lt;")}</td>
    </tr>
  `).join("");
  const html = `<!DOCTYPE html>
    <html><head><meta charset="UTF-8"><title>Relatório de Demandas — Assessoria IPSM</title>
    <style>
      body { font-family: Arial, sans-serif; color: #2B2F33; padding: 28px; }
      h1 { font-size: 18px; color: #0F2A47; margin-bottom: 2px; }
      .sub { font-size: 11px; color: #5B6168; margin-bottom: 16px; }
      table { width: 100%; border-collapse: collapse; font-size: 10.5px; table-layout: fixed; }
      th { background: #0F2A47; color: #fff; text-align: left; padding: 6px 8px; }
      td { padding: 6px 8px; border-bottom: 1px solid #DDE2E7; word-wrap: break-word; overflow-wrap: break-word; }
      tr:nth-child(even) { background: #F4F5F7; }
      .footer { margin-top: 18px; font-size: 9.5px; color: #9aa3ab; }
      .print-bar { margin-bottom: 16px; }
      .print-bar button { font-family: Arial, sans-serif; font-size: 13px; padding: 8px 16px; background: #0F2A47; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
      @media print { .print-bar { display: none; } @page { size: landscape; margin: 12mm; } }
    </style></head><body>
    <div class="print-bar"><button onclick="window.print()">Imprimir / salvar como PDF</button></div>
    <h1>Relatório de Demandas — Assessoria IPSM</h1>
    <div class="sub">Gerado em ${formatarDataHora(new Date().toISOString())} · ${filtrosResumo} · ${dados.length} demanda(s)</div>
    <table>
      <thead><tr><th>Número</th><th>Data</th><th>Solicitante</th><th>Origem</th><th>Assunto</th><th>Responsável</th><th>Prioridade</th><th>Status</th><th>Prazo</th><th>Observações</th></tr></thead>
      <tbody>${linhas || '<tr><td colspan="10">Nenhuma demanda encontrada para os filtros selecionados.</td></tr>'}</tbody>
    </table>
    <div class="footer">Assessoria IPSM — Gestão Inteligente de Demandas e Base Normativa</div>
    </body></html>
  `;
  try {
    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const janela = window.open(url, "_blank");
    if (!janela) {
      URL.revokeObjectURL(url);
      return false;
    }
    setTimeout(() => URL.revokeObjectURL(url), 30000);
    return true;
  } catch (e) {
    return false;
  }
}

function Relatorios() {
  const { demandas } = useApp();
  const toast = useToast();
  const [filtros, setFiltros] = useState({
    dataInicio: "", dataFim: "", origem: "Todas", prioridade: "Todas",
    status: "Todos", responsavel: "", assunto: "",
  });

  const resultado = useMemo(() => aplicarFiltrosRelatorio(demandas, filtros), [demandas, filtros]);

  const resumoFiltros = useMemo(() => {
    const partes = [];
    if (filtros.dataInicio || filtros.dataFim) partes.push(`período ${filtros.dataInicio ? formatarData(filtros.dataInicio) : "início"} a ${filtros.dataFim ? formatarData(filtros.dataFim) : "hoje"}`);
    if (filtros.origem !== "Todas") partes.push(`origem: ${filtros.origem}`);
    if (filtros.prioridade !== "Todas") partes.push(`prioridade: ${filtros.prioridade}`);
    if (filtros.status !== "Todos") partes.push(`status: ${filtros.status}`);
    if (filtros.responsavel) partes.push(`responsável: ${filtros.responsavel}`);
    if (filtros.assunto) partes.push(`assunto: ${filtros.assunto}`);
    return partes.length ? partes.join(" · ") : "sem filtros aplicados";
  }, [filtros]);

  function limparFiltros() {
    setFiltros({ dataInicio: "", dataFim: "", origem: "Todas", prioridade: "Todas", status: "Todos", responsavel: "", assunto: "" });
  }

  return (
    <div className="fade-in">
      <SectionTitle eyebrow="Gestão à vista" title="Relatórios" subtitle="Filtre as demandas e exporte em PDF, Excel ou CSV." />

      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 14 }}>
          <Field label="Data início"><Input type="date" value={filtros.dataInicio} onChange={(e) => setFiltros({ ...filtros, dataInicio: e.target.value })} /></Field>
          <Field label="Data fim"><Input type="date" value={filtros.dataFim} onChange={(e) => setFiltros({ ...filtros, dataFim: e.target.value })} /></Field>
          <Field label="Origem">
            <Select value={filtros.origem} onChange={(e) => setFiltros({ ...filtros, origem: e.target.value })}>
              <option value="Todas">Todas</option>
              {ORIGENS_DEMANDA.map(o => <option key={o} value={o}>{o}</option>)}
            </Select>
          </Field>
          <Field label="Prioridade">
            <Select value={filtros.prioridade} onChange={(e) => setFiltros({ ...filtros, prioridade: e.target.value })}>
              <option value="Todas">Todas</option>
              {PRIORIDADES.map(p => <option key={p} value={p}>{p}</option>)}
            </Select>
          </Field>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
          <Field label="Status">
            <Select value={filtros.status} onChange={(e) => setFiltros({ ...filtros, status: e.target.value })}>
              <option value="Todos">Todos</option>
              {STATUS_DEMANDA.map(s => <option key={s} value={s}>{s}</option>)}
            </Select>
          </Field>
          <Field label="Responsável"><Input value={filtros.responsavel} onChange={(e) => setFiltros({ ...filtros, responsavel: e.target.value })} /></Field>
          <Field label="Assunto"><Input value={filtros.assunto} onChange={(e) => setFiltros({ ...filtros, assunto: e.target.value })} /></Field>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={limparFiltros} style={{ background: "none", border: "none", fontSize: 12.5, color: "var(--steel)", fontWeight: 600 }}>Limpar filtros</button>
          <span style={{ fontSize: 12.5, color: "var(--ink-soft)" }}>{resultado.length} demanda(s) encontrada(s)</span>
        </div>
      </Card>

      <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
        <Button variant="secondary" icon="file-text" onClick={() => { if (!exportarPDF(resultado, resumoFiltros)) toast("Permita pop-ups para gerar o PDF.", "error"); }}>Exportar PDF</Button>
        <Button variant="secondary" icon="file-spreadsheet" onClick={() => { const ok = exportarExcel(resultado, `relatorio-demandas-${hojeISO()}.xlsx`); toast(ok ? "Excel gerado." : "Não foi possível gerar o Excel (biblioteca indisponível). Tente o CSV.", ok ? "success" : "error"); }}>Exportar Excel</Button>
        <Button variant="secondary" icon="file-down" onClick={() => { exportarCSV(resultado, `relatorio-demandas-${hojeISO()}.csv`); toast("CSV gerado.", "success"); }}>Exportar CSV</Button>
      </div>

      {resultado.length === 0 ? (
        <Card><EmptyState icon="file-bar-chart-2" title="Nenhuma demanda para os filtros atuais" subtitle="Ajuste os filtros acima para gerar o relatório." /></Card>
      ) : (
        <div style={{ overflowX: "auto", border: "1px solid var(--line)", borderRadius: 12, background: "var(--paper)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: "var(--pearl)", textAlign: "left" }}>
                {["Número", "Data", "Solicitante", "Origem", "Assunto", "Responsável", "Prioridade", "Status", "Observações"].map(h => (
                  <th key={h} style={{ padding: "10px 14px", fontSize: 11.5, fontWeight: 700, color: "var(--ink-soft)", textTransform: "uppercase" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {resultado.slice(0, 50).map(d => (
                <tr key={d.id} style={{ borderTop: "1px solid var(--line-soft)" }}>
                  <td style={{ padding: "9px 14px", fontFamily: "var(--font-mono)", fontSize: 11.5 }}>{d.numero}</td>
                  <td style={{ padding: "9px 14px" }}>{formatarData(d.data)}</td>
                  <td style={{ padding: "9px 14px" }}>{d.solicitante}</td>
                  <td style={{ padding: "9px 14px" }}>{d.origem}</td>
                  <td style={{ padding: "9px 14px" }}>{d.assunto}</td>
                  <td style={{ padding: "9px 14px" }}>{d.responsavel || "—"}</td>
                  <td style={{ padding: "9px 14px" }}><PrioridadeBadge prioridade={d.prioridade} /></td>
                  <td style={{ padding: "9px 14px" }}><StatusBadge status={d.status} /></td>
                  <td style={{ padding: "9px 14px", maxWidth: 220, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={d.observacoes || ""}>{d.observacoes || "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {resultado.length > 50 && (
            <div style={{ padding: 12, fontSize: 12, color: "var(--ink-soft)", textAlign: "center" }}>Exibindo 50 de {resultado.length} — exporte para ver todos os registros.</div>
          )}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   MÓDULO: ESCALA DE SETORES
============================================================ */

function FormularioEscala({ item, onSalvar, onCancelar, usuarios }) {
  const toast = useToast();
  const [form, setForm] = useState(item || {
    setor: SETORES[0], colaborador: "", data: hojeISO(), turno: TURNOS_ESCALA[0],
    horario_personalizado: "", observacoes: "",
  });
  const [salvando, setSalvando] = useState(false);

  function validar() {
    if (!form.colaborador.trim()) { toast("Informe o colaborador da escala.", "error"); return false; }
    if (!form.data) { toast("Informe a data.", "error"); return false; }
    return true;
  }

  async function salvar() {
    if (!validar()) return;
    setSalvando(true);
    try {
      await onSalvar(form);
    } catch (err) {
      toast("Não foi possível salvar: " + err.message, "error");
    } finally {
      setSalvando(false);
    }
  }

  return (
    <div>
      <Field label="Setor" required>
        <Select value={form.setor} onChange={(e) => setForm({ ...form, setor: e.target.value })}>
          {SETORES.map(s => <option key={s} value={s}>{s}</option>)}
        </Select>
      </Field>
      <Field label="Colaborador" required hint="Nome de quem está na escala.">
        <Input
          list="lista-colaboradores-escala"
          value={form.colaborador}
          onChange={(e) => setForm({ ...form, colaborador: e.target.value })}
          placeholder="Nome completo"
        />
        <datalist id="lista-colaboradores-escala">
          {usuarios.map(u => <option key={u.id} value={nomeCompletoUsuario(u)} />)}
        </datalist>
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="Data" required><Input type="date" value={form.data} onChange={(e) => setForm({ ...form, data: e.target.value })} /></Field>
        <Field label="Turno">
          <Select value={form.turno} onChange={(e) => setForm({ ...form, turno: e.target.value })}>
            {TURNOS_ESCALA.map(t => <option key={t} value={t}>{t}</option>)}
          </Select>
        </Field>
      </div>
      {form.turno === "Personalizado" && (
        <Field label="Horário personalizado" hint='Ex: "13h às 19h"'>
          <Input value={form.horario_personalizado} onChange={(e) => setForm({ ...form, horario_personalizado: e.target.value })} />
        </Field>
      )}
      <Field label="Observações">
        <Textarea rows={2} value={form.observacoes} onChange={(e) => setForm({ ...form, observacoes: e.target.value })} />
      </Field>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 6 }}>
        <Button variant="secondary" onClick={onCancelar}>Cancelar</Button>
        <Button variant="accent" icon="check" disabled={salvando} onClick={salvar}>{salvando ? <Spinner size={14} color="#fff" /> : "Salvar"}</Button>
      </div>
    </div>
  );
}

function EscalaSetores() {
  const { escalas, criarEscala, atualizarEscala, excluirEscala, usuarios } = useApp();
  const toast = useToast();
  const [modalAberto, setModalAberto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [confirmExcluir, setConfirmExcluir] = useState(null);
  const [filtroSetor, setFiltroSetor] = useState("Todos");
  const [filtroData, setFiltroData] = useState(hojeISO());

  const filtradas = useMemo(() => {
    return escalas
      .filter(e => filtroSetor === "Todos" || e.setor === filtroSetor)
      .filter(e => !filtroData || e.data === filtroData)
      .sort((a, b) => (a.setor || "").localeCompare(b.setor || ""));
  }, [escalas, filtroSetor, filtroData]);

  async function salvar(form) {
    if (editando) {
      await atualizarEscala(editando.id, form);
      toast("Escala atualizada.", "success");
    } else {
      await criarEscala(form);
      toast("Escala registrada.", "success");
    }
    setModalAberto(false);
    setEditando(null);
  }

  async function excluir(item) {
    try {
      await excluirEscala(item.id);
      toast("Escala removida.", "info");
    } catch (e) {
      toast("Não foi possível remover: " + e.message, "error");
    }
    setConfirmExcluir(null);
  }

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Operacional"
        title="Escala de Setores"
        subtitle="Organize quem está escalado em cada setor por dia e turno."
        action={<Button icon="plus" variant="accent" onClick={() => { setEditando(null); setModalAberto(true); }}>Nova escala</Button>}
      />

      <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
        <Select value={filtroSetor} onChange={(e) => setFiltroSetor(e.target.value)} style={{ width: 220, flexShrink: 0 }}>
          <option value="Todos">Todos os setores</option>
          {SETORES.map(s => <option key={s} value={s}>{s}</option>)}
        </Select>
        <Input type="date" value={filtroData} onChange={(e) => setFiltroData(e.target.value)} style={{ width: 170, flexShrink: 0 }} />
        {filtroData && (
          <button onClick={() => setFiltroData("")} style={{ fontSize: 12.5, color: "var(--steel)", fontWeight: 600, background: "none", border: "none" }}>
            Ver todas as datas
          </button>
        )}
      </div>

      {escalas.length === 0 ? (
        <Card>
          <EmptyState icon="calendar-days" title="Nenhuma escala cadastrada" subtitle="Cadastre quem está escalado em cada setor, por dia e turno." action={<Button icon="plus" variant="accent" onClick={() => setModalAberto(true)}>Cadastrar escala</Button>} />
        </Card>
      ) : filtradas.length === 0 ? (
        <Card><EmptyState icon="search-x" title="Nenhuma escala para os filtros atuais" subtitle="Ajuste o setor ou a data selecionada." /></Card>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 14 }}>
          {filtradas.map((e) => (
            <Card key={e.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <Badge bg="var(--steel-pale)" fg="var(--steel)">{e.setor}</Badge>
                <span style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>{formatarData(e.data)}</span>
              </div>
              <div style={{ fontSize: 14.5, fontWeight: 600, color: "var(--heading)", marginBottom: 4 }}>{e.colaborador}</div>
              <div style={{ fontSize: 12.5, color: "var(--ink-soft)", marginBottom: e.observacoes ? 8 : 0 }}>
                {e.turno === "Personalizado" ? (e.horario_personalizado || "Horário personalizado") : e.turno}
              </div>
              {e.observacoes && <p style={{ fontSize: 12, color: "var(--ink-soft)", margin: "0 0 10px" }}>{e.observacoes}</p>}
              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                <Button size="sm" variant="secondary" icon="pencil" onClick={() => { setEditando(e); setModalAberto(true); }} style={{ flex: 1 }}>Editar</Button>
                <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmExcluir(e)} style={{ color: "var(--terracotta)" }} />
              </div>
            </Card>
          ))}
        </div>
      )}

      <Modal open={modalAberto} onClose={() => { setModalAberto(false); setEditando(null); }} title={editando ? "Editar escala" : "Nova escala"} width={520}>
        <FormularioEscala item={editando} onSalvar={salvar} onCancelar={() => { setModalAberto(false); setEditando(null); }} usuarios={usuarios} />
      </Modal>

      <Modal open={!!confirmExcluir} onClose={() => setConfirmExcluir(null)} title="Remover escala" width={400}>
        {confirmExcluir && (
          <div>
            <p style={{ fontSize: 14, lineHeight: 1.5 }}>Remover a escala de <strong>{confirmExcluir.colaborador}</strong> em {confirmExcluir.setor} ({formatarData(confirmExcluir.data)})?</p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <Button variant="secondary" onClick={() => setConfirmExcluir(null)}>Cancelar</Button>
              <Button variant="danger" icon="trash-2" onClick={() => excluir(confirmExcluir)}>Remover</Button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

function EscalaMedica() {
  const { escalaMedica, criarEscalaMedica, atualizarEscalaMedica, excluirEscalaMedica } = useApp();
  const toast = useToast();
  const [modalAberto, setModalAberto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [confirmExcluir, setConfirmExcluir] = useState(null);
  const [busca, setBusca] = useState("");

  const porDia = useMemo(() => {
    const map = {};
    DIAS_SEMANA.forEach(d => { map[d] = []; });
    escalaMedica.forEach(e => {
      const texto = `${e.nome_medico} ${e.especialidade || ""}`.toLowerCase();
      if (busca.trim() && !texto.includes(busca.toLowerCase())) return;
      if (!map[e.dia_semana]) map[e.dia_semana] = [];
      map[e.dia_semana].push(e);
    });
    Object.keys(map).forEach(d => map[d].sort((a, b) => (a.horario_inicio || "").localeCompare(b.horario_inicio || "")));
    return map;
  }, [escalaMedica, busca]);

  async function salvar(form) {
    if (editando) {
      await atualizarEscalaMedica(editando.id, form);
      toast("Escala atualizada.", "success");
    } else {
      await criarEscalaMedica(form);
      toast("Escala cadastrada.", "success");
    }
    setModalAberto(false);
    setEditando(null);
  }

  async function excluir(item) {
    try {
      await excluirEscalaMedica(item.id);
      toast("Removido da escala.", "info");
    } catch (e) {
      toast("Não foi possível remover: " + e.message, "error");
    }
    setConfirmExcluir(null);
  }

  const diaAtual = DIAS_SEMANA[(new Date().getDay() + 6) % 7];

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Corpo clínico"
        title="Escala Médica"
        subtitle="Consulte os dias, horários e telefones dos médicos da semana. Qualquer pessoa da equipe pode cadastrar."
        action={<Button icon="plus" variant="accent" onClick={() => { setEditando(null); setModalAberto(true); }}>Novo horário</Button>}
      />

      <div style={{ marginBottom: 18 }}>
        <div style={{ position: "relative", maxWidth: 320 }}>
          <Icon name="search" size={15} color="var(--ink-soft)" style={{ position: "absolute", left: 12, top: 12 }} />
          <Input value={busca} onChange={(e) => setBusca(e.target.value)} placeholder="Buscar médico ou especialidade..." style={{ paddingLeft: 36 }} />
        </div>
      </div>

      {escalaMedica.length === 0 ? (
        <Card><EmptyState icon="stethoscope" title="Nenhum médico cadastrado na escala" subtitle="Cadastre o primeiro horário médico da semana." action={<Button icon="plus" variant="accent" onClick={() => setModalAberto(true)}>Cadastrar horário</Button>} /></Card>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 14 }}>
          {DIAS_SEMANA.map((dia) => (
            <Card key={dia} style={dia === diaAtual ? { border: "1px solid var(--steel)" } : {}}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                <h3 style={{ fontFamily: "var(--font-display)", fontSize: 15, color: "var(--heading)", margin: 0 }}>{dia}</h3>
                {dia === diaAtual && <Badge bg="var(--steel-pale)" fg="var(--steel)">Hoje</Badge>}
              </div>
              {(porDia[dia] || []).length === 0 ? (
                <p style={{ fontSize: 12.5, color: "var(--ink-soft)", margin: 0 }}>Nenhum médico neste dia.</p>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {porDia[dia].map((e, i) => (
                    <div key={e.id} style={{ borderTop: i > 0 ? "1px solid var(--line-soft)" : "none", paddingTop: i > 0 ? 10 : 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 6 }}>
                        <div>
                          <div style={{ fontSize: 13.5, fontWeight: 700, color: "var(--ink)" }}>{e.nome_medico}</div>
                          {e.especialidade && <div style={{ fontSize: 12, color: "var(--ink-soft)" }}>{e.especialidade}</div>}
                        </div>
                        <div style={{ display: "flex", gap: 2, flexShrink: 0 }}>
                          <Button size="sm" variant="ghost" icon="pencil" onClick={() => { setEditando(e); setModalAberto(true); }} />
                          <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmExcluir(e)} style={{ color: "var(--terracotta)" }} />
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4, fontSize: 12.5, color: "var(--ink)" }}>
                        <Icon name="clock" size={13} color="var(--ink-soft)" />
                        {e.horario_inicio || "—"}{e.horario_fim ? ` – ${e.horario_fim}` : ""}
                      </div>
                      {e.telefone && (
                        <a href={"tel:" + e.telefone.replace(/\D/g, "")} style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4, fontSize: 12.5, color: "var(--steel)", textDecoration: "none" }}>
                          <Icon name="phone" size={13} color="var(--steel)" />

                        </a>
                      )}

                    </div>
                  ))}

              )}
            </Card>
          ))}
        </div>
      )}

      <Modal open={modalAberto} onClose={() => { setModalAberto(false); setEditando(null); }} title={editando ? "Editar horário" : "Novo horário médico"} width={560}>
        <FormularioEscalaMedica item={editando} onSalvar={salvar} onCancelar={() => { setModalAberto(false); setEditando(null); }} />
      </Modal>

      <Modal open={!!confirmExcluir} onClose={() => setConfirmExcluir(null)} title="Remover da escala" width={420}>

          <div>
            <p style={{ fontSize: 14, color: "var(--ink)", lineHeight: 1.5 }}>Remover <strong>{confirmExcluir.nome_medico}</strong> ({confirmExcluir.dia_semana})?</p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <Button variant="secondary" onClick={() => setConfirmExcluir(null)}>Cancelar</Button>
              <Button variant="danger" icon="trash-2" onClick={() => excluir(confirmExcluir)}>Remover</Button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

/* ============================================================
   MÓDULO: CALENDÁRIO DE DEMANDAS
============================================================ */

function CalendarioDemandas() {
  const { demandas } = useApp();
  const [mesAtual, setMesAtual] = useState(() => {
    const d = new Date();
    return { ano: d.getFullYear(), mes: d.getMonth() };
  });
  const [diaSelecionado, setDiaSelecionado] = useState(null);

  const eventosPorDia = useMemo(() => {
    const map = {};
    demandas.forEach(d => {
      [["prazo", d.prazo], ["data_agendada", d.data_agendada]].forEach(([tipo, data]) => {
        if (!data) return;
        if (!map[data]) map[data] = [];
        map[data].push({ ...d, __tipo: tipo });
      });
    });
    return map;
  }, [demandas]);

  function mudarMes(delta) {
    setMesAtual((m) => {
      let mes = m.mes + delta;
      let ano = m.ano;
      if (mes < 0) { mes = 11; ano--; }
      if (mes > 11) { mes = 0; ano++; }
      return { ano, mes };
    });
    setDiaSelecionado(null);
  }

  const nomesMes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

  const celulas = useMemo(() => {
    const primeiro = new Date(mesAtual.ano, mesAtual.mes, 1);
    const diaSemanaPrimeiro = (primeiro.getDay() + 6) % 7;
    const diasNoMes = new Date(mesAtual.ano, mesAtual.mes + 1, 0).getDate();
    const arr = [];
    for (let i = 0; i < diaSemanaPrimeiro; i++) arr.push(null);
    for (let dia = 1; dia <= diasNoMes; dia++) {
      arr.push(`${mesAtual.ano}-${String(mesAtual.mes + 1).padStart(2, "0")}-${String(dia).padStart(2, "0")}`);
    }
    return arr;
  }, [mesAtual]);

  const eventosDoSelecionado = diaSelecionado ? (eventosPorDia[diaSelecionado] || []) : [];

  return (
    <div className="fade-in">
      <SectionTitle eyebrow="Agenda" title="Calendário de Demandas" subtitle="Prazos e datas agendadas (consultas, cirurgias, exames) num só lugar." />

      <Card style={{ marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <Button size="sm" variant="secondary" icon="chevron-left" onClick={() => mudarMes(-1)} />
          <h3 style={{ fontFamily: "var(--font-display)", fontSize: 17, color: "var(--heading)", margin: 0 }}>{nomesMes[mesAtual.mes]} de {mesAtual.ano}</h3>
          <Button size="sm" variant="secondary" icon="chevron-right" onClick={() => mudarMes(1)} />
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 6 }}>
          {["Seg", "Ter", "Qua", "Qui", "Sex", "Sáb", "Dom"].map(d => (
            <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "var(--ink-soft)", textTransform: "uppercase" }}>{d}</div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
          {celulas.map((iso, i) => {
            if (!iso) return <div key={"vazio" + i} />;
            const eventos = eventosPorDia[iso] || [];
            const ehHojeCel = iso === hojeISO();
            const selecionado = iso === diaSelecionado;
            return (
              <button
                key={iso}
                onClick={() => setDiaSelecionado(selecionado ? null : iso)}
                style={{
                  minHeight: 64, borderRadius: 8, padding: "6px 6px", textAlign: "left",
