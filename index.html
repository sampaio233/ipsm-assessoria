function FormularioReuniao({ item, onSalvar, onCancelar }) {
  const toast = useToast();
  const [form, setForm] = useState(item || {
    titulo: "", tipo: TIPOS_REUNIAO[0], data: hojeISO(), horario: "09:00",
    participantes: "", pauta: "", local_ou_link: "", observacoes: "",
  });
  const [salvando, setSalvando] = useState(false);

  function validar() {
    if (!form.titulo.trim()) { toast("Informe o título da reunião.", "error"); return false; }
    if (!form.data) { toast("Informe a data.", "error"); return false; }
    return true;
  }

  async function salvar() {
    if (!validar()) return;
    setSalvando(true);
    try {
      await onSalvar(form);
    } catch (err) {
      toast("Não foi possível salvar: " + err.message, "error");
    } finally {
      setSalvando(false);
    }
  }

  return (
    <div>
      <Field label="Título" required><Input value={form.titulo} onChange={(e) => setForm({ ...form, titulo: e.target.value })} /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
        <Field label="Tipo">
          <Select value={form.tipo} onChange={(e) => setForm({ ...form, tipo: e.target.value })}>
            {TIPOS_REUNIAO.map(t => <option key={t} value={t}>{t}</option>)}
          </Select>
        </Field>
        <Field label="Data" required><Input type="date" value={form.data} onChange={(e) => setForm({ ...form, data: e.target.value })} /></Field>
        <Field label="Horário"><Input type="time" value={form.horario} onChange={(e) => setForm({ ...form, horario: e.target.value })} /></Field>
      </div>
      <Field label="Participantes" hint="Separe por vírgula."><Input value={form.participantes} onChange={(e) => setForm({ ...form, participantes: e.target.value })} /></Field>
      <Field label={form.tipo === "Externa" ? "Local ou link" : "Local ou link (opcional)"}>
        <Input value={form.local_ou_link} onChange={(e) => setForm({ ...form, local_ou_link: e.target.value })} placeholder="Sala, endereço ou link da videochamada" />
      </Field>
      <Field label="Pauta"><Textarea rows={3} value={form.pauta} onChange={(e) => setForm({ ...form, pauta: e.target.value })} /></Field>
      <Field label="Observações"><Textarea rows={2} value={form.observacoes} onChange={(e) => setForm({ ...form, observacoes: e.target.value })} /></Field>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 6 }}>
        <Button variant="secondary" onClick={onCancelar}>Cancelar</Button>
        <Button variant="accent" icon="check" disabled={salvando} onClick={salvar}>{salvando ? <Spinner size={14} color="#fff" /> : "Salvar"}</Button>
      </div>
    </div>
  );
}

function Reunioes() {
  const { reunioes, criarReuniao, atualizarReuniao, excluirReuniao } = useApp();
  const toast = useToast();
  const [modalAberto, setModalAberto] = useState(false);
  const [editando, setEditando] = useState(null);
  const [verReuniao, setVerReuniao] = useState(null);
  const [confirmExcluir, setConfirmExcluir] = useState(null);
  const [filtroTipo, setFiltroTipo] = useState("Todos");

  const filtradas = useMemo(() => reunioes.filter(r => filtroTipo === "Todos" || r.tipo === filtroTipo), [reunioes, filtroTipo]);
  const proximas = useMemo(() => filtradas.filter(r => r.data >= hojeISO()).sort((a, b) => `${a.data}${a.horario || ""}`.localeCompare(`${b.data}${b.horario || ""}`)), [filtradas]);
  const passadas = useMemo(() => filtradas.filter(r => r.data < hojeISO()).sort((a, b) => `${b.data}${b.horario || ""}`.localeCompare(`${a.data}${a.horario || ""}`)), [filtradas]);

  async function salvar(form) {
    if (editando) {
      await atualizarReuniao(editando.id, form);
      toast("Reunião atualizada.", "success");
    } else {
      await criarReuniao(form);
      toast("Reunião registrada.", "success");
    }
    setModalAberto(false);
    setEditando(null);
  }

  async function excluir(r) {
    try {
      await excluirReuniao(r.id);
      toast("Reunião removida.", "info");
    } catch (e) {
      toast("Não foi possível remover: " + e.message, "error");
    }
    setConfirmExcluir(null);
  }

  function CardReuniao({ r }) {
    return (
      <Card style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
          <Badge bg={r.tipo === "Externa" ? "var(--amber-pale)" : "var(--steel-pale)"} fg={r.tipo === "Externa" ? "var(--amber)" : "var(--steel)"}>{r.tipo}</Badge>
          <div style={{ display: "flex", gap: 2 }}>
            <Button size="sm" variant="ghost" icon="eye" onClick={() => setVerReuniao(r)} />
            <Button size="sm" variant="ghost" icon="pencil" onClick={() => { setEditando(r); setModalAberto(true); }} />
            <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmExcluir(r)} style={{ color: "var(--terracotta)" }} />
          </div>
        </div>
        <div style={{ fontSize: 14.5, fontWeight: 700, color: "var(--ink)" }}>{r.titulo}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: "var(--ink-soft)" }}>
          <Icon name="calendar-days" size={13} /> {formatarData(r.data)}{r.horario ? ` às ${r.horario}` : ""}
        </div>
        {r.local_ou_link && (
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: "var(--ink-soft)" }}>
            <Icon name="map-pin" size={13} /> {r.local_ou_link}
          </div>
        )}
        {r.participantes && (
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: "var(--ink-soft)" }}>
            <Icon name="users" size={13} /> {r.participantes}
          </div>
        )}
      </Card>
    );
  }

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Agenda da equipe"
        title="Reuniões"
        subtitle="Reuniões internas e externas, com pauta e participantes."
        action={<Button icon="plus" variant="accent" onClick={() => { setEditando(null); setModalAberto(true); }}>Nova reunião</Button>}
      />

      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {["Todos", ...TIPOS_REUNIAO].map(t => (
          <button key={t} onClick={() => setFiltroTipo(t)} style={{
            padding: "7px 14px", borderRadius: 999, fontSize: 13, fontWeight: 600,
            border: "1px solid " + (filtroTipo === t ? "var(--steel)" : "var(--line)"),
            background: filtroTipo === t ? "var(--steel-pale)" : "var(--paper)",
            color: filtroTipo === t ? "var(--steel)" : "var(--ink)",
          }}>{t}</button>
        ))}
      </div>

      {reunioes.length === 0 ? (
        <Card><EmptyState icon="calendar-days" title="Nenhuma reunião registrada" subtitle="Cadastre reuniões internas ou externas da equipe." action={<Button icon="plus" variant="accent" onClick={() => setModalAberto(true)}>Registrar reunião</Button>} /></Card>
      ) : (
        <>
          {proximas.length > 0 && (
            <>
              <h3 style={{ fontFamily: "var(--font-display)", fontSize: 15, color: "var(--heading)", marginBottom: 12 }}>Próximas</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14, marginBottom: 24 }}>
                {proximas.map(r => <CardReuniao key={r.id} r={r} />)}
              </div>
            </>
          )}
          {passadas.length > 0 && (
            <>
              <h3 style={{ fontFamily: "var(--font-display)", fontSize: 15, color: "var(--heading)", marginBottom: 12 }}>Anteriores</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>
                {passadas.map(r => <CardReuniao key={r.id} r={r} />)}
              </div>
            </>
          )}
        </>
      )}

      <Modal open={modalAberto} onClose={() => { setModalAberto(false); setEditando(null); }} title={editando ? "Editar reunião" : "Nova reunião"} width={600}>
        <FormularioReuniao item={editando} onSalvar={salvar} onCancelar={() => { setModalAberto(false); setEditando(null); }} />
      </Modal>

      <Modal open={!!verReuniao} onClose={() => setVerReuniao(null)} title={verReuniao ? verReuniao.titulo : ""} width={560}>
        {verReuniao && (
          <div>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <Badge bg={verReuniao.tipo === "Externa" ? "var(--amber-pale)" : "var(--steel-pale)"} fg={verReuniao.tipo === "Externa" ? "var(--amber)" : "var(--steel)"}>{verReuniao.tipo}</Badge>
            </div>
            <p style={{ fontSize: 13.5, color: "var(--ink)" }}><strong>Data:</strong> {formatarData(verReuniao.data)}{verReuniao.horario ? ` às ${verReuniao.horario}` : ""}</p>
            {verReuniao.local_ou_link && <p style={{ fontSize: 13.5, color: "var(--ink)" }}><strong>Local/link:</strong> {verReuniao.local_ou_link}</p>}
            {verReuniao.participantes && <p style={{ fontSize: 13.5, color: "var(--ink)" }}><strong>Participantes:</strong> {verReuniao.participantes}</p>}
            {verReuniao.pauta && <div><strong style={{ fontSize: 13.5, color: "var(--ink)" }}>Pauta:</strong><p style={{ fontSize: 13.5, color: "var(--ink-soft)", whiteSpace: "pre-wrap" }}>{verReuniao.pauta}</p></div>}
            {verReuniao.observacoes && <div><strong style={{ fontSize: 13.5, color: "var(--ink)" }}>Observações:</strong><p style={{ fontSize: 13.5, color: "var(--ink-soft)", whiteSpace: "pre-wrap" }}>{verReuniao.observacoes}</p></div>}
          </div>
        )}
      </Modal>

      <Modal open={!!confirmExcluir} onClose={() => setConfirmExcluir(null)} title="Remover reunião" width={420}>
        {confirmExcluir && (
          <div>
            <p style={{ fontSize: 14, color: "var(--ink)", lineHeight: 1.5 }}>Remover a reunião <strong>{confirmExcluir.titulo}</strong>?</p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <Button variant="secondary" onClick={() => setConfirmExcluir(null)}>Cancelar</Button>
              <Button variant="danger" icon="trash-2" onClick={() => excluir(confirmExcluir)}>Remover</Button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

function ProdutividadeMedica() {
  const {
    produtividadeMedica, criarProdutividadeMedica, atualizarProdutividadeMedica, excluirProdutividadeMedica,
    medicos, criarMedico, excluirMedico,
    caixaEntradaMedica, criarCaixaEntrada, atualizarCaixaEntrada, excluirCaixaEntrada,
  } = useApp();
  const toast = useToast();

  const [modalRegistro, setModalRegistro] = useState(false);
  const [editandoRegistro, setEditandoRegistro] = useState(null);
  const [modalMedico, setModalMedico] = useState(false);
  const [modalCaixa, setModalCaixa] = useState(false);
  const [editandoCaixa, setEditandoCaixa] = useState(null);
  const [confirmExcluir, setConfirmExcluir] = useState(null); // { tipo: 'registro'|'medico'|'caixa', item }

  const [buscaMedico, setBuscaMedico] = useState("");
  const [periodoInicio, setPeriodoInicio] = useState("");
  const [periodoFim, setPeriodoFim] = useState("");

  const rechartsDisponivel = useRechartsPronto();
  const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Legend } = rechartsDisponivel ? Recharts : {};

  const registrosFiltrados = useMemo(() => {
    return produtividadeMedica.filter(p => {
      const matchMedico = !buscaMedico.trim() || (p.nome_medico || "").toLowerCase().includes(buscaMedico.toLowerCase());
      const matchInicio = !periodoInicio || (p.data || "") >= periodoInicio;
      const matchFim = !periodoFim || (p.data || "") <= periodoFim;
      return matchMedico && matchInicio && matchFim;
    }).sort((a, b) => (b.data || "").localeCompare(a.data || ""));
  }, [produtividadeMedica, buscaMedico, periodoInicio, periodoFim]);

  const caixaFiltrada = useMemo(() => {
    return caixaEntradaMedica.filter(c => {
      const matchInicio = !periodoInicio || (c.data || "") >= periodoInicio;
      const matchFim = !periodoFim || (c.data || "") <= periodoFim;
      return matchInicio && matchFim;
    }).sort((a, b) => (b.data || "").localeCompare(a.data || ""));
  }, [caixaEntradaMedica, periodoInicio, periodoFim]);

  const relatorioPorMedico = useMemo(() => {
    const map = {};
    registrosFiltrados.forEach(p => {
      if (!map[p.nome_medico]) map[p.nome_medico] = { nome: p.nome_medico, atribuidos: 0, feitos: 0 };
      map[p.nome_medico].atribuidos += p.atribuidos || 0;
      map[p.nome_medico].feitos += p.feitos || 0;
    });
    return Object.values(map).sort((a, b) => b.atribuidos - a.atribuidos);
  }, [registrosFiltrados]);

  const totais = useMemo(() => {
    const atribuidos = registrosFiltrados.reduce((s, p) => s + (p.atribuidos || 0), 0);
    const feitos = registrosFiltrados.reduce((s, p) => s + (p.feitos || 0), 0);
    const caixaMaisRecente = caixaEntradaMedica.length > 0
      ? [...caixaEntradaMedica].sort((a, b) => (b.data || "").localeCompare(a.data || ""))[0]
      : null;
    const taxa = atribuidos > 0 ? Math.round((feitos / atribuidos) * 100) : 0;
    return { atribuidos, feitos, caixaMaisRecente, taxa };
  }, [registrosFiltrados, caixaEntradaMedica]);

  const dadosGrafico = useMemo(() => relatorioPorMedico.slice(0, 12).map(m => ({ name: m.nome, Atribuídos: m.atribuidos, Feitos: m.feitos })), [relatorioPorMedico]);

  async function salvarRegistro(form) {
    if (editandoRegistro) {
      await atualizarProdutividadeMedica(editandoRegistro.id, form);
      toast("Registro atualizado.", "success");
    } else {
      await criarProdutividadeMedica(form);
      toast("Produtividade registrada.", "success");
    }
    setModalRegistro(false);
    setEditandoRegistro(null);
  }

  async function salvarMedico(form) {
    await criarMedico(form);
    toast("Médico cadastrado.", "success");
    setModalMedico(false);
  }

  async function salvarCaixa(form) {
    if (editandoCaixa) {
      await atualizarCaixaEntrada(editandoCaixa.id, form);
      toast("Registro de caixa atualizado.", "success");
    } else {
      await criarCaixaEntrada(form);
      toast("Caixa de entrada registrada.", "success");
    }
    setModalCaixa(false);
    setEditandoCaixa(null);
  }

  async function confirmarExclusao() {
    if (!confirmExcluir) return;
    const { tipo, item } = confirmExcluir;
    try {
      if (tipo === "registro") { await excluirProdutividadeMedica(item.id); toast("Registro removido.", "info"); }
      if (tipo === "medico") { await excluirMedico(item.id); toast("Médico removido da lista.", "info"); }
      if (tipo === "caixa") { await excluirCaixaEntrada(item.id); toast("Registro de caixa removido.", "info"); }
    } catch (e) {
      toast("Não foi possível remover: " + e.message, "error");
    }
    setConfirmExcluir(null);
  }

  const tooltipStyle = { fontSize: 12.5, borderRadius: 8, border: "1px solid var(--line)", background: "var(--paper)", color: "var(--ink)" };

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Corpo clínico"
        title="Produtividade Médica"
        subtitle="Registre, por dia, quantos processos foram atribuídos e feitos por cada médico. A caixa de entrada é um número geral do dia, separado disso."
        action={<Button icon="plus" variant="accent" onClick={() => { setEditandoRegistro(null); setModalRegistro(true); }}>Novo registro</Button>}
      />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 20 }}>
        <Card style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: "var(--steel-pale)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="inbox" size={17} color="var(--steel)" /></div>
          <div><div style={{ fontSize: 11.5, color: "var(--ink-soft)", fontWeight: 600, textTransform: "uppercase" }}>Atribuídos</div><div style={{ fontSize: 20, fontWeight: 800, color: "var(--heading)" }}>{totais.atribuidos}</div></div>
        </Card>
        <Card style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: "var(--teal-pale)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="check-circle-2" size={17} color="var(--teal)" /></div>
          <div><div style={{ fontSize: 11.5, color: "var(--ink-soft)", fontWeight: 600, textTransform: "uppercase" }}>Feitos</div><div style={{ fontSize: 20, fontWeight: 800, color: "var(--heading)" }}>{totais.feitos}</div></div>
        </Card>
        <Card style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: "var(--amber-pale)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="package" size={17} color="var(--amber)" /></div>
          <div>
            <div style={{ fontSize: 11.5, color: "var(--ink-soft)", fontWeight: 600, textTransform: "uppercase" }}>Caixa de entrada</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: "var(--heading)" }}>{totais.caixaMaisRecente ? totais.caixaMaisRecente.quantidade : "—"}</div>
            {totais.caixaMaisRecente && <div style={{ fontSize: 10.5, color: "var(--ink-soft)" }}>em {formatarData(totais.caixaMaisRecente.data)}</div>}
          </div>
        </Card>
        <Card style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: "var(--steel-pale)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="percent" size={17} color="var(--steel)" /></div>
          <div><div style={{ fontSize: 11.5, color: "var(--ink-soft)", fontWeight: 600, textTransform: "uppercase" }}>Taxa de conclusão</div><div style={{ fontSize: 20, fontWeight: 800, color: "var(--heading)" }}>{totais.taxa}%</div></div>
        </Card>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 15, color: "var(--heading)", margin: 0 }}>Médicos cadastrados</h3>
            <Button size="sm" variant="secondary" icon="plus" onClick={() => setModalMedico(true)}>Novo médico</Button>
          </div>
          {medicos.length === 0 ? (
            <p style={{ fontSize: 13, color: "var(--ink-soft)" }}>Nenhum médico cadastrado ainda.</p>
          ) : (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {medicos.map(m => (
                <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 999, border: "1px solid var(--line)", background: "var(--pearl)" }}>
                  <span style={{ fontSize: 13, color: "var(--ink)", fontWeight: 600 }}>{m.nome}</span>
                  <button onClick={() => setConfirmExcluir({ tipo: "medico", item: m })} style={{ background: "transparent", border: "none", display: "flex", cursor: "pointer" }} title="Remover médico">
                    <Icon name="x" size={13} color="var(--ink-soft)" />
                  </button>
                </div>
              ))}
            </div>
          )}
        </Card>

        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 15, color: "var(--heading)", margin: 0 }}>Caixa de entrada por dia</h3>
            <Button size="sm" variant="secondary" icon="plus" onClick={() => { setEditandoCaixa(null); setModalCaixa(true); }}>Novo</Button>
          </div>
          {caixaFiltrada.length === 0 ? (
            <p style={{ fontSize: 13, color: "var(--ink-soft)" }}>Nenhum registro de caixa de entrada ainda.</p>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: 180, overflow: "auto" }}>
              {caixaFiltrada.map(c => (
                <div key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid var(--line-soft)", paddingBottom: 8 }}>
                  <div>
                    <span style={{ fontSize: 13.5, fontWeight: 700, color: "var(--ink)" }}>{c.quantidade} processos</span>
                    <span style={{ fontSize: 12, color: "var(--ink-soft)", marginLeft: 8 }}>{formatarData(c.data)}</span>
                  </div>
                  <div style={{ display: "flex", gap: 2 }}>
                    <Button size="sm" variant="ghost" icon="pencil" onClick={() => { setEditandoCaixa(c); setModalCaixa(true); }} />
                    <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmExcluir({ tipo: "caixa", item: c })} style={{ color: "var(--terracotta)" }} />
                  </div>
                </div>
              ))}
            </div>
          )}
        </Card>
      </div>

      {rechartsDisponivel && dadosGrafico.length > 0 && (
        <Card style={{ marginBottom: 20 }}>
          <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Atribuídos x Feitos por médico</h3>
          <ResponsiveContainer width="100%" height={Math.max(220, dadosGrafico.length * 42)}>
            <BarChart data={dadosGrafico} layout="vertical" margin={{ left: 8 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="var(--line-soft)" horizontal={false} />
              <XAxis type="number" allowDecimals={false} tick={{ fontSize: 11.5, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="name" width={140} tick={{ fontSize: 11, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={tooltipStyle} itemStyle={{ color: "var(--ink)" }} labelStyle={{ color: "var(--ink)" }} />
              <Legend wrapperStyle={{ fontSize: 12 }} />
              <Bar dataKey="Atribuídos" fill="var(--steel)" radius={[0, 6, 6, 0]} />
              <Bar dataKey="Feitos" fill="var(--teal)" radius={[0, 6, 6, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </Card>
      )}

      {relatorioPorMedico.length > 0 && (
        <Card style={{ marginBottom: 20, padding: 0 }}>
          <div style={{ overflow: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5 }}>
              <thead>
                <tr style={{ textAlign: "left", borderBottom: "1px solid var(--line)" }}>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase" }}>Médico</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase" }}>Atribuídos</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase" }}>Feitos</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase" }}>Taxa</th>
                </tr>
              </thead>
              <tbody>
                {relatorioPorMedico.map((m) => (
                  <tr key={m.nome} style={{ borderBottom: "1px solid var(--line-soft)" }}>
                    <td style={{ padding: "10px 16px", fontWeight: 600, color: "var(--ink)" }}>{m.nome}</td>
                    <td style={{ padding: "10px 16px", color: "var(--ink-soft)" }}>{m.atribuidos}</td>
                    <td style={{ padding: "10px 16px", color: "var(--ink-soft)" }}>{m.feitos}</td>
                    <td style={{ padding: "10px 16px", color: "var(--ink-soft)" }}>{m.atribuidos > 0 ? Math.round((m.feitos / m.atribuidos) * 100) : 0}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
        <div style={{ position: "relative", flex: "1 1 220px" }}>
          <Icon name="search" size={15} color="var(--ink-soft)" style={{ position: "absolute", left: 12, top: 12 }} />
          <Input value={buscaMedico} onChange={(e) => setBuscaMedico(e.target.value)} placeholder="Buscar por nome do médico..." style={{ paddingLeft: 36 }} />
        </div>
        <Input type="date" value={periodoInicio} onChange={(e) => setPeriodoInicio(e.target.value)} style={{ width: 160 }} title="Período — de" />
        <Input type="date" value={periodoFim} onChange={(e) => setPeriodoFim(e.target.value)} style={{ width: 160 }} title="Período — até" />
      </div>

      {produtividadeMedica.length === 0 ? (
        <Card><EmptyState icon="stethoscope" title="Nenhum registro de produtividade" subtitle="Cadastre um médico e registre a produtividade diária." action={<Button icon="plus" variant="accent" onClick={() => setModalRegistro(true)}>Novo registro</Button>} /></Card>
      ) : registrosFiltrados.length === 0 ? (
        <Card><EmptyState icon="search-x" title="Nenhum resultado" subtitle="Ajuste os filtros de busca." /></Card>
      ) : (
        <Card padded={false}>
          <div style={{ overflow: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5 }}>
              <thead>
                <tr style={{ textAlign: "left", borderBottom: "1px solid var(--line)" }}>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase" }}>Médico</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase" }}>Data</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase" }}>Atribuídos</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase" }}>Feitos</th>
                  <th style={{ padding: "12px 16px" }}></th>
                </tr>
              </thead>
              <tbody>
                {registrosFiltrados.map((p) => (
                  <tr key={p.id} style={{ borderBottom: "1px solid var(--line-soft)" }}>
                    <td style={{ padding: "10px 16px", fontWeight: 600, color: "var(--ink)" }}>{p.nome_medico}</td>
                    <td style={{ padding: "10px 16px", color: "var(--ink-soft)" }}>{formatarData(p.data)}</td>
                    <td style={{ padding: "10px 16px", color: "var(--ink-soft)" }}>{p.atribuidos}</td>
                    <td style={{ padding: "10px 16px", color: "var(--ink-soft)" }}>{p.feitos}</td>
                    <td style={{ padding: "10px 16px", textAlign: "right" }}>
                      <Button size="sm" variant="ghost" icon="pencil" onClick={() => { setEditandoRegistro(p); setModalRegistro(true); }} />
                      <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmExcluir({ tipo: "registro", item: p })} style={{ color: "var(--terracotta)" }} />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      <Modal open={modalRegistro} onClose={() => { setModalRegistro(false); setEditandoRegistro(null); }} title={editandoRegistro ? "Editar registro" : "Novo registro de produtividade"} width={600}>
        <FormularioProdutividadeMedica
          item={editandoRegistro}
          medicos={medicos}
          onSalvar={salvarRegistro}
          onCancelar={() => { setModalRegistro(false); setEditandoRegistro(null); }}
          onPedirNovoMedico={() => setModalMedico(true)}
        />
      </Modal>

      <Modal open={modalMedico} onClose={() => setModalMedico(false)} title="Novo médico" width={440}>
        <FormularioMedico onSalvar={salvarMedico} onCancelar={() => setModalMedico(false)} />
      </Modal>

      <Modal open={modalCaixa} onClose={() => { setModalCaixa(false); setEditandoCaixa(null); }} title={editandoCaixa ? "Editar caixa de entrada" : "Nova caixa de entrada"} width={520}>
        <FormularioCaixaEntrada item={editandoCaixa} onSalvar={salvarCaixa} onCancelar={() => { setModalCaixa(false); setEditandoCaixa(null); }} />
      </Modal>

      <Modal open={!!confirmExcluir} onClose={() => setConfirmExcluir(null)} title="Confirmar exclusão" width={420}>
        {confirmExcluir && (
          <div>
            <p style={{ fontSize: 14, color: "var(--ink)", lineHeight: 1.5 }}>
              {confirmExcluir.tipo === "registro" && <>Remover o registro de <strong>{confirmExcluir.item.nome_medico}</strong> ({formatarData(confirmExcluir.item.data)})?</>}
              {confirmExcluir.tipo === "medico" && <>Remover <strong>{confirmExcluir.item.nome}</strong> da lista de médicos? Os registros de produtividade já lançados para ele não serão apagados.</>}
              {confirmExcluir.tipo === "caixa" && <>Remover o registro de caixa de entrada de {formatarData(confirmExcluir.item.data)} ({confirmExcluir.item.quantidade} processos)?</>}
            </p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <Button variant="secondary" onClick={() => setConfirmExcluir(null)}>Cancelar</Button>
              <Button variant="danger" icon="trash-2" onClick={confirmarExclusao}>Remover</Button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

/* ============================================================
   MÓDULO: ATESTADOS DE FUNCIONÁRIOS
============================================================ */


const TIPOS_ATESTADO = ["Médico", "Odontológico", "Outros"];

function calcularDiasAtestado(dataInicio, dataFim) {
  if (!dataInicio || !dataFim) return 0;
  const d1 = new Date(dataInicio + "T00:00:00");
  const d2 = new Date(dataFim + "T00:00:00");
  const diff = Math.round((d2 - d1) / 86400000) + 1;
  return diff > 0 ? diff : 0;
}

function FormularioAtestado({ onSalvar, onCancelar }) {
  const toast = useToast();
  const [form, setForm] = useState({
    nome_funcionario: "", data_inicio: hojeISO(), data_fim: hojeISO(),
    tipo: TIPOS_ATESTADO[0], observacoes: "", arquivo_nome: "", arquivo_url: "",
  });
  const [enviando, setEnviando] = useState(false);
  const [salvando, setSalvando] = useState(false);

  const dias = useMemo(() => calcularDiasAtestado(form.data_inicio, form.data_fim), [form.data_inicio, form.data_fim]);

  async function handleArquivo(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const ehPDF = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
    if (!ehPDF) {
      toast("Somente arquivos em PDF são aceitos para o atestado.", "error");
      e.target.value = "";
      return;
    }
    setEnviando(true);
    try {
      const enviado = await enviarArquivo(file, "atestados");
      setForm((f) => ({ ...f, arquivo_nome: enviado.nome, arquivo_url: enviado.url }));
    } catch (err) {
      toast("Não foi possível enviar o arquivo: " + err.message, "error");
    } finally {
      setEnviando(false);
    }
  }

  function validar() {
    if (!form.nome_funcionario.trim()) { toast("Informe o nome do funcionário.", "error"); return false; }
    if (!form.data_inicio || !form.data_fim) { toast("Informe a data de início e a data de fim.", "error"); return false; }
    if (form.data_fim < form.data_inicio) { toast("A data de fim não pode ser anterior à data de início.", "error"); return false; }
    if (!form.arquivo_url) { toast("Anexe o atestado em PDF.", "error"); return false; }
    return true;
  }

  async function salvar() {
    if (!validar()) return;
    setSalvando(true);
    try {
      await onSalvar({ ...form, quantidade_dias: dias });
    } catch (err) {
      toast("Não foi possível salvar: " + err.message, "error");
    } finally {
      setSalvando(false);
    }
  }

  return (
    <div>
      <Field label="Nome do funcionário" required>
        <Input value={form.nome_funcionario} onChange={(e) => setForm({ ...form, nome_funcionario: e.target.value })} placeholder="Nome completo" />
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="Data de início" required><Input type="date" value={form.data_inicio} onChange={(e) => setForm({ ...form, data_inicio: e.target.value })} /></Field>
        <Field label="Data de fim" required><Input type="date" value={form.data_fim} onChange={(e) => setForm({ ...form, data_fim: e.target.value })} /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="Quantidade de dias" hint="Calculada automaticamente com base nas datas">
          <Input value={dias} disabled />
        </Field>
        <Field label="Tipo de atestado" required>
          <Select value={form.tipo} onChange={(e) => setForm({ ...form, tipo: e.target.value })}>
            {TIPOS_ATESTADO.map(t => <option key={t} value={t}>{t}</option>)}
          </Select>
        </Field>
      </div>
      <Field label="Observações">
        <Textarea rows={3} value={form.observacoes} onChange={(e) => setForm({ ...form, observacoes: e.target.value })} />
      </Field>
      <Field label="Arquivo (somente PDF)" required>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <label style={{
            display: "inline-flex", alignItems: "center", gap: 7, padding: "9px 14px", borderRadius: 8,
            border: "1px solid var(--line)", background: "var(--pearl)", fontSize: 13.5, fontWeight: 600, color: "var(--steel-light)",
          }}>
            <Icon name="upload" size={15} />
            Escolher PDF
            <input type="file" accept="application/pdf,.pdf" onChange={handleArquivo} style={{ display: "none" }} />
          </label>
          {enviando && <Spinner size={14} />}
          {form.arquivo_nome && !enviando && (
            <Badge bg="var(--teal-pale)" fg="var(--teal)"><Icon name="paperclip" size={12} />{form.arquivo_nome}</Badge>
          )}
        </div>
      </Field>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 6 }}>
        <Button variant="secondary" onClick={onCancelar}>Cancelar</Button>
        <Button variant="accent" icon="check" disabled={salvando} onClick={salvar}>{salvando ? <Spinner size={14} color="#fff" /> : "Salvar atestado"}</Button>
      </div>
    </div>
  );
}

function AtestadosFuncionarios() {
  const { atestados, criarAtestado, excluirAtestado, usuarioAtual } = useApp();
  const toast = useToast();
  const ehAdmin = usuarioAtual && usuarioAtual.role === "admin";
  const [modalAberto, setModalAberto] = useState(false);
  const [buscaNome, setBuscaNome] = useState("");
  const [filtroTipo, setFiltroTipo] = useState("Todos");
  const [periodoInicio, setPeriodoInicio] = useState("");
  const [periodoFim, setPeriodoFim] = useState("");
  const [confirmExcluir, setConfirmExcluir] = useState(null);

  const rechartsDisponivel = useRechartsPronto();
  const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = rechartsDisponivel ? Recharts : {};

  const filtrados = useMemo(() => {
    return atestados.filter(a => {
      const matchNome = !buscaNome.trim() || (a.nome_funcionario || "").toLowerCase().includes(buscaNome.toLowerCase());
      const matchTipo = filtroTipo === "Todos" || a.tipo === filtroTipo;
      const matchInicio = !periodoInicio || (a.data_fim || a.data_inicio || "") >= periodoInicio;
      const matchFim = !periodoFim || (a.data_inicio || "") <= periodoFim;
      return matchNome && matchTipo && matchInicio && matchFim;
    }).sort((a, b) => (b.data_inicio || "").localeCompare(a.data_inicio || ""));
  }, [atestados, buscaNome, filtroTipo, periodoInicio, periodoFim]);

  const porFuncionario = useMemo(() => {
    const map = {};
    atestados.forEach(a => { map[a.nome_funcionario] = (map[a.nome_funcionario] || 0) + 1; });
    return Object.entries(map).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 12);
  }, [atestados]);

  const diasPorPeriodo = useMemo(() => {
    const map = {};
    atestados.forEach(a => {
      const mes = (a.data_inicio || "").slice(0, 7);
      if (!mes) return;
      map[mes] = (map[mes] || 0) + (a.quantidade_dias || 0);
    });
    return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0])).map(([name, value]) => ({ name, value }));
  }, [atestados]);

  async function salvar(form) {
    await criarAtestado(form);
    toast("Atestado cadastrado.", "success");
    setModalAberto(false);
  }

  async function excluir(a) {
    try {
      await excluirAtestado(a.id);
      toast("Atestado removido.", "info");
    } catch (e) {
      toast("Não foi possível remover: " + e.message, "error");
    } finally {
      setConfirmExcluir(null);
    }
  }

  const tooltipStyle = { fontSize: 12.5, borderRadius: 8, border: "1px solid var(--line)", background: "var(--paper)", color: "var(--ink)" };

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Recursos humanos"
        title="Atestados de Funcionários"
        subtitle="Cadastre e consulte atestados médicos, odontológicos e de outros tipos, com o respectivo arquivo em PDF."
        action={<Button icon="plus" variant="accent" onClick={() => setModalAberto(true)}>Novo atestado</Button>}
      />

      {ehAdmin && atestados.length > 0 && rechartsDisponivel && (
        <div id="charts-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
          <Card>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Atestados por funcionário</h3>
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={porFuncionario} layout="vertical" margin={{ left: 8 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--line-soft)" horizontal={false} />
                <XAxis type="number" allowDecimals={false} tick={{ fontSize: 11.5, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
                <YAxis type="category" dataKey="name" width={140} tick={{ fontSize: 11, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={tooltipStyle} itemStyle={{ color: "var(--ink)" }} labelStyle={{ color: "var(--ink)" }} />
                <Bar dataKey="value" fill="var(--steel)" radius={[0, 6, 6, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </Card>
          <Card>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Dias afastados por período (mês)</h3>
            <ResponsiveContainer width="100%" height={220}>
              <BarChart data={diasPorPeriodo}>
                <CartesianGrid strokeDasharray="3 3" stroke="var(--line-soft)" vertical={false} />
                <XAxis dataKey="name" tick={{ fontSize: 11, fill: "var(--ink-soft)" }} axisLine={{ stroke: "var(--line)" }} tickLine={false} />
                <YAxis allowDecimals={false} tick={{ fontSize: 11.5, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={tooltipStyle} itemStyle={{ color: "var(--ink)" }} labelStyle={{ color: "var(--ink)" }} />
                <Bar dataKey="value" fill="var(--gold)" radius={[6, 6, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </Card>
        </div>
      )}

      <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
        <div style={{ position: "relative", flex: "1 1 220px" }}>
          <Icon name="search" size={15} color="var(--ink-soft)" style={{ position: "absolute", left: 12, top: 12 }} />
          <Input value={buscaNome} onChange={(e) => setBuscaNome(e.target.value)} placeholder="Buscar por nome do funcionário..." style={{ paddingLeft: 36 }} />
        </div>
        <Input type="date" value={periodoInicio} onChange={(e) => setPeriodoInicio(e.target.value)} style={{ width: 160 }} title="Período — de" />
        <Input type="date" value={periodoFim} onChange={(e) => setPeriodoFim(e.target.value)} style={{ width: 160 }} title="Período — até" />
        <Select value={filtroTipo} onChange={(e) => setFiltroTipo(e.target.value)} style={{ width: 180, flexShrink: 0 }}>
          <option value="Todos">Todos os tipos</option>
          {TIPOS_ATESTADO.map(t => <option key={t} value={t}>{t}</option>)}
        </Select>
      </div>

      {atestados.length === 0 ? (
        <Card>
          <EmptyState icon="file-text" title="Nenhum atestado cadastrado" subtitle="Cadastre o primeiro atestado de funcionário." action={<Button icon="plus" variant="accent" onClick={() => setModalAberto(true)}>Cadastrar atestado</Button>} />
        </Card>
      ) : filtrados.length === 0 ? (
        <Card><EmptyState icon="search-x" title="Nenhum resultado" subtitle="Ajuste os filtros de busca." /></Card>
      ) : (
        <Card padded={false}>
          <div id="atestados-table-wrap" style={{ overflow: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5 }}>
              <thead>
                <tr style={{ textAlign: "left", borderBottom: "1px solid var(--line)" }}>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase", letterSpacing: "0.04em" }}>Nome</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase", letterSpacing: "0.04em" }}>Período</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase", letterSpacing: "0.04em" }}>Dias afastados</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase", letterSpacing: "0.04em" }}>Tipo</th>
                  <th style={{ padding: "12px 16px", color: "var(--ink-soft)", fontSize: 12, textTransform: "uppercase", letterSpacing: "0.04em" }}>PDF</th>
                  {ehAdmin && <th style={{ padding: "12px 16px" }}></th>}
                </tr>
              </thead>
              <tbody>
                {filtrados.map((a) => (
                  <tr key={a.id} style={{ borderBottom: "1px solid var(--line-soft)" }}>
                    <td style={{ padding: "12px 16px", color: "var(--ink)", fontWeight: 600 }}>{a.nome_funcionario}</td>
                    <td style={{ padding: "12px 16px", color: "var(--ink-soft)" }}>{formatarData(a.data_inicio)} – {formatarData(a.data_fim)}</td>
                    <td style={{ padding: "12px 16px", color: "var(--ink-soft)" }}>{a.quantidade_dias}</td>
                    <td style={{ padding: "12px 16px" }}><Badge bg="var(--steel-pale)" fg="var(--steel)">{a.tipo}</Badge></td>
                    <td style={{ padding: "12px 16px" }}>
                      {a.arquivo_url ? (
                        <a href={a.arquivo_url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
                          <Button size="sm" variant="secondary" icon="external-link">Ver PDF</Button>
                        </a>
                      ) : "—"}
                    </td>
                    {ehAdmin && (
                      <td style={{ padding: "12px 16px", textAlign: "right" }}>
                        <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmExcluir(a)} style={{ color: "var(--terracotta)" }} title="Somente administradores podem excluir" />
                      </td>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      <Modal open={modalAberto} onClose={() => setModalAberto(false)} title="Novo atestado" width={640}>
        <FormularioAtestado onSalvar={salvar} onCancelar={() => setModalAberto(false)} />
      </Modal>

      <Modal open={!!confirmExcluir} onClose={() => setConfirmExcluir(null)} title="Remover atestado" width={420}>
        {confirmExcluir && (
          <div>
            <p style={{ fontSize: 14, color: "var(--ink)", lineHeight: 1.5 }}>
              Remover o atestado de <strong>{confirmExcluir.nome_funcionario}</strong> ({formatarData(confirmExcluir.data_inicio)} – {formatarData(confirmExcluir.data_fim)})?
            </p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <Button variant="secondary" onClick={() => setConfirmExcluir(null)}>Cancelar</Button>
              <Button variant="danger" icon="trash-2" onClick={() => excluir(confirmExcluir)}>Remover</Button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

/* ============================================================
   MÓDULO: EQUIPE & PRODUTIVIDADE (somente ADM)
============================================================ */

function EquipeProdutividade() {
  const { usuarios, trocarRolePerfil, alternarAtivoPerfil, excluirPerfil, demandas, usuarioAtual } = useApp();
  const toast = useToast();
  const [confirmRemover, setConfirmRemover] = useState(null);
  const [enviandoReset, setEnviandoReset] = useState(null);

  const rechartsDisponivel = useRechartsPronto();
  const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = rechartsDisponivel ? Recharts : {};

  const estatisticasPorUsuario = useMemo(() => {
    return usuarios.map(u => {
      const minhasDemandas = demandas.filter(d => d.usuario_criador_id === u.id);
      const concluidas = minhasDemandas.filter(d => d.status === "Concluída").length;
      const emAndamento = minhasDemandas.filter(d => d.status === "Em andamento" || d.status === "Aguardando resposta").length;
      const urgentes = minhasDemandas.filter(d => d.prioridade === "Urgente").length;
      const hoje = minhasDemandas.filter(d => ehHoje(d.data_criacao)).length;
      return { usuario: u, total: minhasDemandas.length, concluidas, emAndamento, urgentes, hoje };
    }).sort((a, b) => b.total - a.total);
  }, [usuarios, demandas]);

  const demandasPorDia = useMemo(() => {
    const map = {};
    demandas.forEach(d => {
      const dia = (d.data_criacao || "").slice(0, 10);
      if (!dia) return;
      map[dia] = (map[dia] || 0) + 1;
    });
    return Object.entries(map)
      .sort((a, b) => a[0].localeCompare(b[0]))
      .slice(-21)
      .map(([dia, value]) => ({ name: formatarData(dia), value }));
  }, [demandas]);

  async function trocarRole(u) {
    if (u.id === usuarioAtual.id) { toast("Você não pode alterar seu próprio nível de acesso.", "error"); return; }
    try {
      await trocarRolePerfil(u.id, u.role === "admin" ? "colaborador" : "admin");
      toast(`${nomeCompletoUsuario(u)} agora é ${u.role === "admin" ? "colaborador" : "administrador"}.`, "success");
    } catch (e) {
      toast("Não foi possível alterar: " + e.message, "error");
    }
  }

  async function alternarAtivo(u) {
    if (u.id === usuarioAtual.id) { toast("Você não pode desativar seu próprio acesso.", "error"); return; }
    try {
      await alternarAtivoPerfil(u.id, u.ativo === false ? true : false);
      toast(u.ativo === false ? "Acesso reativado." : "Acesso desativado.", "info");
    } catch (e) {
      toast("Não foi possível alterar: " + e.message, "error");
    }
  }

  async function enviarResetSenha(u) {
    toast("Para redefinir a senha de um colaborador, vá em Supabase → Authentication → Users, encontre o usuário pelo e-mail interno (" + gerarEmailInterno(u.nome, u.sobrenome) + ") e use a opção 'Send password reset'.","info");
  }

  async function removerUsuario(u) {
    if (u.id === usuarioAtual.id) { toast("Você não pode remover seu próprio cadastro.", "error"); return; }
    try {
      await excluirPerfil(u.id);
      toast("Cadastro removido.", "info");
    } catch (e) {
      toast("Não foi possível remover: " + e.message, "error");
    }
    setConfirmRemover(null);
  }

  return (
    <div className="fade-in">
      <SectionTitle
        eyebrow="Painel do administrador"
        title="Equipe & Produtividade"
        subtitle="Acompanhe quantas demandas cada colaborador tratou e gerencie acessos da equipe."
      />

      {rechartsDisponivel && demandasPorDia.length > 0 && (
        <Card style={{ marginBottom: 20 }}>
          <h3 style={{ fontFamily: "var(--font-display)", fontSize: 16, color: "var(--heading)", marginTop: 0, marginBottom: 14 }}>Demandas por dia</h3>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={demandasPorDia}>
              <CartesianGrid strokeDasharray="3 3" stroke="var(--line-soft)" vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 11, fill: "var(--ink-soft)" }} axisLine={{ stroke: "var(--line)" }} tickLine={false} />
              <YAxis allowDecimals={false} tick={{ fontSize: 11.5, fill: "var(--ink-soft)" }} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ fontSize: 12.5, borderRadius: 8, border: "1px solid var(--line)", background: "var(--paper)", color: "var(--ink)" }} itemStyle={{ color: "var(--ink)" }} labelStyle={{ color: "var(--ink)" }} />
              <Bar dataKey="value" fill="var(--steel)" radius={[6, 6, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </Card>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {estatisticasPorUsuario.map(({ usuario, total, concluidas, emAndamento, urgentes, hoje }) => (
          <Card key={usuario.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{
                  width: 38, height: 38, borderRadius: "50%", background: usuario.role === "admin" ? "var(--gold)" : "var(--steel)",
                  color: "var(--ink)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0,
                }}>
                  {iniciaisUsuario(usuario)}
                </div>
                <div>
                  <div style={{ fontSize: 14.5, fontWeight: 600, color: "var(--heading)", display: "flex", alignItems: "center", gap: 6 }}>
                    {nomeCompletoUsuario(usuario)}
                    {usuario.role === "admin" && <Icon name="crown" size={13} color="var(--gold)" />}
                    {usuario.ativo === false && <Badge bg="rgba(148,160,172,0.16)" fg="#9AA6B2">Inativo</Badge>}
                  </div>
                  <div style={{ fontSize: 12, color: "var(--ink-soft)" }}>{usuario.setor || "—"} · {usuario.role === "admin" ? "Administrador" : "Colaborador"} · {usuario.email}</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <Button size="sm" variant="secondary" icon="key-round" disabled={enviandoReset === usuario.id} onClick={() => enviarResetSenha(usuario)}>
                  {enviandoReset === usuario.id ? <Spinner size={12} /> : "Enviar redefinição de senha"}
                </Button>
                {usuario.id !== usuarioAtual.id && (
                  <>
                    <Button size="sm" variant="secondary" icon="shield" onClick={() => trocarRole(usuario)}>
                      {usuario.role === "admin" ? "Tornar colaborador" : "Tornar ADM"}
                    </Button>
                    <Button size="sm" variant="ghost" onClick={() => alternarAtivo(usuario)}>{usuario.ativo === false ? "Reativar" : "Desativar"}</Button>
                    <Button size="sm" variant="ghost" icon="trash-2" onClick={() => setConfirmRemover(usuario)} style={{ color: "var(--terracotta)" }} />
                  </>
                )}
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10, marginTop: 16 }}>
              {[
                { label: "Total tratadas", valor: total, cor: "#E05257" },
                { label: "Concluídas", valor: concluidas, cor: "#2E9E7C" },
                { label: "Em andamento", valor: emAndamento, cor: "#C99A2E" },
                { label: "Urgentes", valor: urgentes, cor: "#D97A3D" },
                { label: "Hoje", valor: hoje, cor: "#B3862E" },
              ].map((m) => (
                <div key={m.label} style={{ background: "var(--pearl)", borderRadius: 8, padding: "10px 12px", textAlign: "center" }}>
                  <div style={{ fontSize: 19, fontWeight: 700, color: m.cor, fontFamily: "var(--font-display)" }}>{m.valor}</div>
                  <div style={{ fontSize: 10.5, color: "var(--ink-soft)", marginTop: 2 }}>{m.label}</div>
                </div>
              ))}
            </div>
          </Card>
        ))}
      </div>

      <Modal open={!!confirmRemover} onClose={() => setConfirmRemover(null)} title="Remover cadastro" width={400}>
        {confirmRemover && (
          <div>
            <p style={{ fontSize: 14, lineHeight: 1.5 }}>Remover o cadastro de <strong>{nomeCompletoUsuario(confirmRemover)}</strong>? O histórico de demandas tratadas por essa pessoa será mantido, mas o acesso será perdido permanentemente. (A conta de login no Supabase Auth precisa ser removida separadamente pelo painel do Supabase, se necessário.)</p>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
              <Button variant="secondary" onClick={() => setConfirmRemover(null)}>Cancelar</Button>
              <Button variant="danger" icon="trash-2" onClick={() => removerUsuario(confirmRemover)}>Remover</Button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

function AppRoot() {
  const [active, setActive] = useState("dashboard");
  const [mobileOpen, setMobileOpen] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [erroFatal, setErroFatal] = useState("");

  const [documentos, setDocumentos] = useState([]);
  const [demandas, setDemandas] = useState([]);
  const [atestados, setAtestados] = useState([]);
  const [usuarios, setUsuarios] = useState([]);
  const [escalas, setEscalas] = useState([]);
  const [escalaMedica, setEscalaMedica] = useState([]);
  const [reunioes, setReunioes] = useState([]);
  const [produtividadeMedica, setProdutividadeMedica] = useState([]);
  const [medicos, setMedicos] = useState([]);
  const [caixaEntradaMedica, setCaixaEntradaMedica] = useState([]);
  const [sessaoAuth, setSessaoAuth] = useState(null);
  const [usuarioAtual, setUsuarioAtual] = useState(null);

  async function carregarDadosDaEquipe() {
    const [docs, dem, ates, esc, escMed, reun, prodMed, meds, caixaMed, perfis] = await Promise.all([
      listarRegistros("documentos", "criado_em"),
      listarRegistros("demandas", "data_criacao"),
      listarRegistros("atestados", "criado_em"),
      listarRegistros("escalas", "data"),
      listarRegistros("escala_medica", "criado_em"),
      listarRegistros("reunioes", "data"),
      listarRegistros("produtividade_medica", "data"),
      listarRegistros("medicos", "nome"),
      listarRegistros("caixa_entrada_medica", "data"),
      listarPerfis(),
    ]);
    setDocumentos(docs);
    setDemandas(dem);
    setAtestados(ates);
    setEscalas(esc);
    setEscalaMedica(escMed);
    setReunioes(reun);
    setProdutividadeMedica(prodMed);
    setMedicos(meds);
    setCaixaEntradaMedica(caixaMed);
    setUsuarios(perfis);
  }

  // sessão de autenticação Supabase
  useEffect(() => {
    let inscrito = true;
    (async () => {
      try {
        // Se vier de um callback OAuth (Google), aguarda um momento
        // para o Supabase processar o token do hash antes de verificar a sessão.
        if (window.__OAUTH_CALLBACK__) {
          await new Promise(resolve => setTimeout(resolve, 1500));
        }
        const sessao = await obterSessaoAtual();
        if (!inscrito) return;
        setSessaoAuth(sessao);
        if (sessao) {
          const perfil = await obterOuCriarPerfil(sessao.user);
          setUsuarioAtual(perfil);
          await carregarDadosDaEquipe();
        }
        setLoaded(true);
      } catch (e) {
        setErroFatal("Não foi possível conectar ao Supabase. Verifique a URL e a chave configuradas no início do arquivo. Detalhe: " + e.message);
        setLoaded(true);
      }
    })();

    const { data: listener } = supabaseClient.auth.onAuthStateChange(async (evento, novaSessao) => {
      if (!inscrito) return;
      setSessaoAuth(novaSessao);
      if (novaSessao) {
        try {
          const perfil = await obterOuCriarPerfil(novaSessao.user);
          if (!inscrito) return;
          setUsuarioAtual(perfil);
          await carregarDadosDaEquipe();
          // Garante que o loaded seja true após login bem-sucedido
          setLoaded(true);
        } catch (e) {
          setErroFatal("Não foi possível carregar seu perfil. Detalhe: " + e.message);
        }
      } else {
        setUsuarioAtual(null);
        setDocumentos([]); setDemandas([]); setAtestados([]); setEscalas([]); setEscalaMedica([]); setReunioes([]); setProdutividadeMedica([]); setMedicos([]); setCaixaEntradaMedica([]); setUsuarios([]);
      }
    });
    return () => { inscrito = false; listener.subscription.unsubscribe(); };
  }, []);

  function logout() {
    sairDaConta();
  }

  /* ---------- CRUD: documentos (Base Normativa) ---------- */
  async function criarDocumento(form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const novo = await inserirRegistro("documentos", { ...campos, criado_em: new Date().toISOString() });
    setDocumentos((prev) => [novo, ...prev]);
  }
  async function atualizarDocumento(id, form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const atualizado = await atualizarRegistro("documentos", id, campos);
    setDocumentos((prev) => prev.map(d => d.id === id ? atualizado : d));
  }
  async function excluirDocumento(id) {
    await excluirRegistro("documentos", id);
    setDocumentos((prev) => prev.filter(d => d.id !== id));
  }

  /* ---------- CRUD: atestados de funcionários ---------- */
  async function criarAtestado(form) {
    const novo = await inserirRegistro("atestados", { ...form, criado_em: new Date().toISOString() });
    setAtestados((prev) => [novo, ...prev]);
  }
  async function excluirAtestado(id) {
    if (!usuarioAtual || usuarioAtual.role !== "admin") {
      throw new Error("Apenas administradores podem excluir atestados.");
    }
    await excluirRegistro("atestados", id);
    setAtestados((prev) => prev.filter(a => a.id !== id));
  }

  /* ---------- CRUD: demandas ---------- */
  function sanitizarDemanda(form) {
    // O Supabase rejeita string vazia em campos de data — converte para null
    const campos = { ...form };
    ["data", "prazo", "data_agendada"].forEach(campo => {
      if (campos[campo] === "" || campos[campo] === undefined) campos[campo] = null;
    });
    return campos;
  }

  async function criarDemanda(form) {
    const total = await contarRegistros("demandas");
    const numero = gerarNumeroDemanda(total + 1);
    const novo = await inserirRegistro("demandas", { ...sanitizarDemanda(form), numero, data_criacao: new Date().toISOString() });
    setDemandas((prev) => [novo, ...prev]);
  }
  async function atualizarDemanda(id, form) {
    const atualizado = await atualizarRegistro("demandas", id, sanitizarDemanda(form));
    setDemandas((prev) => prev.map(d => d.id === id ? atualizado : d));
  }
  async function excluirDemanda(id) {
    await excluirRegistro("demandas", id);
    setDemandas((prev) => prev.filter(d => d.id !== id));
  }
  async function atualizarStatusDemanda(id, status) {
    const atualizado = await atualizarRegistro("demandas", id, { status });
    setDemandas((prev) => prev.map(d => d.id === id ? atualizado : d));
  }

  /* ---------- CRUD: escalas ---------- */
  async function criarEscala(form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const novo = await inserirRegistro("escalas", { ...campos, criado_em: new Date().toISOString() });
    setEscalas((prev) => [novo, ...prev]);
  }
  async function atualizarEscala(id, form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const atualizado = await atualizarRegistro("escalas", id, campos);
    setEscalas((prev) => prev.map(e => e.id === id ? atualizado : e));
  }
  async function excluirEscala(id) {
    await excluirRegistro("escalas", id);
    setEscalas((prev) => prev.filter(e => e.id !== id));
  }

  /* ---------- CRUD: escala médica ---------- */
  async function criarEscalaMedica(form) {
    const novo = await inserirRegistro("escala_medica", { ...form, criado_em: new Date().toISOString() });
    setEscalaMedica((prev) => [novo, ...prev]);
  }
  async function atualizarEscalaMedica(id, form) {
    const atualizado = await atualizarRegistro("escala_medica", id, form);
    setEscalaMedica((prev) => prev.map(e => e.id === id ? atualizado : e));
  }
  async function excluirEscalaMedica(id) {
    await excluirRegistro("escala_medica", id);
    setEscalaMedica((prev) => prev.filter(e => e.id !== id));
  }

  /* ---------- CRUD: reuniões ---------- */
  async function criarReuniao(form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const novo = await inserirRegistro("reunioes", { ...campos, criado_em: new Date().toISOString() });
    setReunioes((prev) => [novo, ...prev]);
  }
  async function atualizarReuniao(id, form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const atualizado = await atualizarRegistro("reunioes", id, campos);
    setReunioes((prev) => prev.map(r => r.id === id ? atualizado : r));
  }
  async function excluirReuniao(id) {
    await excluirRegistro("reunioes", id);
    setReunioes((prev) => prev.filter(r => r.id !== id));
  }

  /* ---------- CRUD: produtividade médica ---------- */
  async function criarProdutividadeMedica(form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const novo = await inserirRegistro("produtividade_medica", { ...campos, criado_em: new Date().toISOString() });
    setProdutividadeMedica((prev) => [novo, ...prev]);
  }
  async function atualizarProdutividadeMedica(id, form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const atualizado = await atualizarRegistro("produtividade_medica", id, campos);
    setProdutividadeMedica((prev) => prev.map(p => p.id === id ? atualizado : p));
  }
  async function excluirProdutividadeMedica(id) {
    await excluirRegistro("produtividade_medica", id);
    setProdutividadeMedica((prev) => prev.filter(p => p.id !== id));
  }

  /* ---------- CRUD: médicos (lista reutilizável) ---------- */
  async function criarMedico(form) {
    const novo = await inserirRegistro("medicos", { ...form, criado_em: new Date().toISOString() });
    setMedicos((prev) => [...prev, novo].sort((a, b) => a.nome.localeCompare(b.nome)));
  }
  async function excluirMedico(id) {
    await excluirRegistro("medicos", id);
    setMedicos((prev) => prev.filter(m => m.id !== id));
  }

  /* ---------- CRUD: caixa de entrada médica (contagem geral do dia) ---------- */
  async function criarCaixaEntrada(form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const novo = await inserirRegistro("caixa_entrada_medica", { ...campos, criado_em: new Date().toISOString() });
    setCaixaEntradaMedica((prev) => [novo, ...prev]);
  }
  async function atualizarCaixaEntrada(id, form) {
    const campos = { ...form };
    if (campos.data === "" || campos.data === undefined) campos.data = null;
    const atualizado = await atualizarRegistro("caixa_entrada_medica", id, campos);
    setCaixaEntradaMedica((prev) => prev.map(c => c.id === id ? atualizado : c));
  }
  async function excluirCaixaEntrada(id) {
    await excluirRegistro("caixa_entrada_medica", id);
    setCaixaEntradaMedica((prev) => prev.filter(c => c.id !== id));
  }

  /* ---------- Gestão de perfis (Equipe & Produtividade) ---------- */
  async function trocarRolePerfil(id, novoRole) {
    await atualizarPerfil(id, { role: novoRole });
    setUsuarios((prev) => prev.map(u => u.id === id ? { ...u, role: novoRole } : u));
  }
  async function alternarAtivoPerfil(id, ativo) {
    await atualizarPerfil(id, { ativo });
    setUsuarios((prev) => prev.map(u => u.id === id ? { ...u, ativo } : u));
  }
  async function excluirPerfil(id) {
    await removerPerfil(id);
    setUsuarios((prev) => prev.filter(u => u.id !== id));
  }

  // injeta responsividade via media query manual (inline-style based layout)
  useEffect(() => {
    const styleEl = document.createElement("style");
    styleEl.textContent = `
      @media (max-width: 900px) {
        #app-sidebar { position: fixed !important; left: 0; top: 0; transform: translateX(-100%); transition: transform 0.22s ease; }
        #app-sidebar.open { transform: translateX(0); }
        #sidebar-scrim { display: block !important; }
        #mobile-menu-btn { display: inline-flex !important; }
        #main-content-area { padding: 16px !important; }
        #kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
        #charts-grid { grid-template-columns: 1fr !important; }
        #demandas-table-wrap table { font-size: 12.5px; }
      }
      @media (max-width: 600px) {
        #kpi-grid { grid-template-columns: 1fr 1fr !important; }
      }
    `;
    document.head.appendChild(styleEl);
    return () => document.head.removeChild(styleEl);
  }, []);

  useEffect(() => {
    const el = document.getElementById("app-sidebar");
    if (el) {
      if (mobileOpen) el.classList.add("open");
      else el.classList.remove("open");
    }
  }, [mobileOpen]);

  const ctxValue = {
    documentos, criarDocumento, atualizarDocumento, excluirDocumento,
    demandas, criarDemanda, atualizarDemanda, excluirDemanda, atualizarStatusDemanda,
    atestados, criarAtestado, excluirAtestado,
    escalas, criarEscala, atualizarEscala, excluirEscala,
    escalaMedica, criarEscalaMedica, atualizarEscalaMedica, excluirEscalaMedica,
    reunioes, criarReuniao, atualizarReuniao, excluirReuniao,
    produtividadeMedica, criarProdutividadeMedica, atualizarProdutividadeMedica, excluirProdutividadeMedica,
    medicos, criarMedico, excluirMedico,
    caixaEntradaMedica, criarCaixaEntrada, atualizarCaixaEntrada, excluirCaixaEntrada,
    usuarios, trocarRolePerfil, alternarAtivoPerfil, excluirPerfil,
    usuarioAtual, logout,
  };

  const navTitle = (NAV_ITEMS.find(n => n.id === active) || {}).label || "";

  if (erroFatal) {
    return (
      <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 14, background: "var(--pearl)", padding: 24, textAlign: "center" }}>
        <Icon name="alert-triangle" size={28} color="var(--terracotta)" />
        <p style={{ color: "var(--ink)", fontSize: 14, maxWidth: 480, lineHeight: 1.6 }}>{erroFatal}</p>
      </div>
    );
  }

  if (!loaded) {
    return (
      <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12, background: "var(--pearl)" }}>
        <Spinner size={26} />
        <span style={{ color: "var(--ink-soft)", fontSize: 14 }}>Carregando dados da assessoria…</span>
      </div>
    );
  }

  if (!sessaoAuth || !usuarioAtual) {
    return (
      <ToastProvider>
        <TelaAutenticacao />
      </ToastProvider>
    );
  }

  const itensNav = NAV_ITEMS.filter(item => !item.adminOnly || usuarioAtual.role === "admin");

  return (
    <AppContext.Provider value={ctxValue}>
      <ToastProvider>
        <div style={{ display: "flex", minHeight: "100vh" }}>
          <Sidebar active={active} setActive={setActive} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} itensNav={itensNav} usuarioAtual={usuarioAtual} onLogout={logout} />
          <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
            <Topbar title={navTitle} setMobileOpen={setMobileOpen} usuarioAtual={usuarioAtual} />
            <FraseMotivacional compacta />
            <main id="main-content-area" style={{ flex: 1, padding: "28px 32px", maxWidth: 1280, width: "100%", margin: "0 auto" }}>
              {active === "dashboard" && <Dashboard setActive={setActive} />}
              {active === "base" && <BaseNormativa />}
              {active === "redacao" && <AssistenteRedacao />}
              {active === "demandas" && <GestaoDemandas />}
              {active === "calendario" && <CalendarioDemandas />}
              {active === "escala" && <EscalaSetores />}
              {active === "escalamedica" && <EscalaMedica />}
              {active === "reunioes" && <Reunioes />}
              {active === "produtividademedica" && <ProdutividadeMedica />}
              {active === "atestados" && <AtestadosFuncionarios />}
              {active === "equipe" && usuarioAtual.role === "admin" && <EquipeProdutividade />}
              {active === "relatorios" && <Relatorios />}
            </main>
          </div>
        </div>
      </ToastProvider>
    </AppContext.Provider>
  );
}

/* ============================================================
   MONTAGEM DA APLICAÇÃO
============================================================ */

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppRoot />);
window.__APP_MONTADO__ = true;
</script>
</body>
</html>
